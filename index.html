// ── Heatmap — reads from somnus_state_v1 ───────────────────
function heatmap(ss) {
  const today    = new Date(); today.setHours(0,0,0,0);
  const startDay = new Date(today.getTime() - 27 * 86400000);
  const dow      = startDay.getDay();
  const empties  = Array(dow).fill('<div class="hm-d empty"></div>').join('');

  const cells = [];
  for (let i = 0; i < 28; i++) {
    const d      = new Date(startDay.getTime() + i * 86400000);
    const k      = dk(d);
    const e      = ss?.data?.[k];
    const status = e?.status;
    const valve  = (ss?.valves?.[k] || 0) > 0;
    const ft     = d > today;
    let cls = 'hm-d';
    if      (ft)               cls += ' empty';
    else if (status === 'yes')    cls += ' g';
    else if (status === 'social') cls += ' ok';
    else if (status === 'no')     cls += ' b';
    cells.push(`<div class="${cls}" title="${k}">
      ${valve && !ft ? '<div style="width:4px;height:4px;border-radius:50%;background:rgba(168,85,247,.85);position:absolute;top:2px;left:2px"></div>' : ''}
    </div>`);
  }

  // Ensure hm-d has position:relative for the valve dot
  return `
  <div class="hm-wrap">
    <div class="hm-dlbls">${['S','M','T','W','T','F','S'].map(d=>`<div class="hm-dl">${d}</div>`).join('')}</div>
    <div class="hm-grid" style="position:relative">${empties}${cells.join('')}</div>
    <div class="hm-legend">
      <div class="hm-li"><div class="hm-li-dot" style="background:var(--vitality)"></div>Good</div>
      <div class="hm-li"><div class="hm-li-dot" style="background:rgba(255,179,71,.35)"></div>Social</div>
      <div class="hm-li"><div class="hm-li-dot" style="background:var(--danger);opacity:.55"></div>Missed</div>
      <div class="hm-li"><div class="hm-li-dot" style="background:rgba(168,85,247,.65)"></div>Valve</div>
    </div>
  </div>`;
}

// Apollo session log XP calculation
function calcSessionXP() {
  const sl = S.sessionLog;
  let xp = 0;
  if (sl.dance)        xp += 30;
  if (sl.danceConvos)  xp += Math.min(sl.danceConvos, 3) * 5;
  if (sl.danceNumbers) xp += sl.danceNumbers * 25;
  if (sl.runClub)      xp += sl.runStayed ? 20 : 10;
  if (sl.spikeEvent)   xp += 20;
  if (sl.approaches)   xp += sl.approaches * 25;
  if (sl.numbers)      xp += sl.numbers * 5; // extra numbers beyond dance
  if (sl.dates)        xp += sl.dates * 35;
  return xp;
}

function updateSessionLog(key, val) {
  const wk = wk_key();
  if (S.sessionLog.weekKey !== wk) {
    S.sessionLog = { weekKey:wk, dance:false, danceConvos:0, danceNumbers:0, runClub:false, runStayed:false, spikeEvent:false, approaches:0, numbers:0, dates:0 };
  }
  S.sessionLog[key] = val;
  save();
  rPresence();
}

function incSessionLog(key, delta) {
  const wk = wk_key();
  if (S.sessionLog.weekKey !== wk) {
    S.sessionLog = { weekKey:wk, dance:false, danceConvos:0, danceNumbers:0, runClub:false, runStayed:false, spikeEvent:false, approaches:0, numbers:0, dates:0 };
  }
  S.sessionLog[key] = Math.max(0, (S.sessionLog[key] || 0) + delta);
  save();
  rPresence();
}

function wk_key() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(d.setDate(diff));
  return mon.toISOString().slice(0, 10);
}

// Apollo weather/date planner
const AP_LAT = 40.7589, AP_LON = -73.9851;
const AP_DAYS_OF_WEEK = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const AP_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function apWxEmoji(code) {
  if (code===0) return '☀️';
  if (code<=2)  return '⛅';
  if (code===3) return '☁️';
  if (code>=45&&code<=48) return '🌫️';
  if (code>=51&&code<=67) return '🌧️';
  if (code>=71&&code<=77) return '❄️';
  if (code>=80&&code<=86) return '🌦️';
  if (code>=95) return '⛈️';
  return '🌡️';
}

function apGetCondition(high, precip, code) {
  if (high >= 84) return 'hot';
  if (precip > 40 || (code >= 61 && code <= 67) || (code >= 80 && code <= 99)) return 'rainy';
  if (high < 46) return 'cold';
  if (high < 55) return 'mild';
  return 'great';
}

const AP_COND_LABELS = {
  hot:'🥵 Hot', great:'✅ Great', mild:'🌤️ Shoulder', rainy:'🌧️ Rain', cold:'🧣 Cold'
};
const AP_COND_CHIPS = {
  hot:'ap-chip-hot', great:'ap-chip-great', mild:'ap-chip-mild', rainy:'ap-chip-rainy', cold:'ap-chip-cold'
};

async function apLoadWeather() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${AP_LAT}&longitude=${AP_LON}`
    + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode,windspeed_10m_max`
    + `&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=America%2FNew_York&forecast_days=10`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const j = await r.json();
  _apDays = j.daily.time.map((t, i) => ({
    dateStr: t, date: new Date(t + 'T12:00:00'),
    high: Math.round(j.daily.temperature_2m_max[i]),
    low:  Math.round(j.daily.temperature_2m_min[i]),
    precip: j.daily.precipitation_probability_max[i],
    code: j.daily.weathercode[i],
    wind: Math.round(j.daily.windspeed_10m_max[i]),
  }));
  _apSelDay = 0;
  rPresence();
}

function apSelectDay(i)  { _apSelDay = i;  rPresence(); }
function apSelectType(n) { _apSelType = n; rPresence(); }

function apCopyText(text, btnId) {
  const finish = () => {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2000);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(finish).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta); finish();
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); finish();
  }
}

function rApLog() {
  const sl = S.sessionLog;
  const wk = wk_key();
  // reset if new week
  if (sl.weekKey && sl.weekKey !== wk) {
    S.sessionLog = { weekKey:wk, dance:false, danceConvos:0, danceNumbers:0, runClub:false, runStayed:false, spikeEvent:false, approaches:0, numbers:0, dates:0 };
    save();
  }
  const totalXP = calcSessionXP();

  function toggle(field) { return `updateSessionLog('${field}', !S.sessionLog['${field}'])`; }
  function cnt(field, delta) { return `incSessionLog('${field}', ${delta})`; }

  function cntRow(label, sub, field) {
    const v = sl[field] || 0;
    return `<div class="ap-log-row">
      <div><div class="ap-log-lbl">${label}</div>${sub ? `<div class="ap-log-sub">${sub}</div>` : ''}</div>
      <div class="ap-log-counter">
        <div class="ap-log-cnt-btn" onclick="${cnt(field, -1)}">−</div>
        <div class="ap-log-cnt-val">${v}</div>
        <div class="ap-log-cnt-btn" onclick="${cnt(field, 1)}">+</div>
      </div>
    </div>`;
  }

  function togRow(label, sub, field) {
    const on = sl[field] ? 'on' : '';
    return `<div class="ap-log-row">
      <div><div class="ap-log-lbl">${label}</div>${sub ? `<div class="ap-log-sub">${sub}</div>` : ''}</div>
      <div class="ap-log-toggle ${on}" onclick="${toggle(field)}"></div>
    </div>`;
  }

  return `<div class="ap-log-wrap">
    <div class="ap-log-total">
      <div class="ap-log-total-lbl">This week's field XP</div>
      <div class="ap-log-total-xp">+${totalXP} XP</div>
    </div>

    <div class="ap-log-section">

        <div class="ap-log-sec-title">💃 Dance Class</div>

// ── Commitment helpers ─────────────────────────────────────
const COMMIT_KEY = 'sl_commitments';

function getCommitments() {
  try { return JSON.parse(localStorage.getItem(COMMIT_KEY) || '[]'); } catch(e) { return []; }
}

// Convert HH:MM → "9:15 AM" for display; pass through legacy strings as-is
function fmtTimeDisplay(t) {
  if (!t) return '';
  if (/^\d{2}:\d{2}$/.test(t)) {
    var parts = t.split(':'); var h = parseInt(parts[0]); var m = parseInt(parts[1]);
    var ap = h >= 12 ? 'PM' : 'AM'; var h12 = h % 12 || 12;
    return m === 0 ? h12 + ' ' + ap : h12 + ':' + String(m).padStart(2,'0') + ' ' + ap;
  }
  return t;
}
// Parse legacy "9am" / "9:15am" strings → "HH:MM" for time input value
function toTimeInput(t) {
  if (!t) return '';
  if (/^\d{2}:\d{2}$/.test(t)) return t;
  var m = t.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)?$/i);
  if (m) {
    var h = parseInt(m[1]); var mn = m[2] ? parseInt(m[2]) : 0;
    var ap = m[3] ? m[3].toLowerCase() : '';
    if (ap === 'pm' && h < 12) h += 12;
    if (ap === 'am' && h === 12) h = 0;
    return String(h).padStart(2,'0') + ':' + String(mn).padStart(2,'0');
  }
  return '';
}

function saveCommitment(task, time, forDate, hardStop) {
  if (!forDate) {
    forDate = new Date().getHours() < 4
      ? dk()
      : dk(new Date(Date.now() + 86400000));
  }
  const commits = getCommitments();
  const filtered = commits.filter(function(c) { return c.forDate !== forDate; });
  const entry = { forDate: forDate, task: task, time: time, savedOn: dk() };
  if (hardStop) entry.hardStop = hardStop;
  filtered.push(entry);
  if (filtered.length > 90) filtered.splice(0, filtered.length - 90);
  localStorage.setItem(COMMIT_KEY, JSON.stringify(filtered));
}

function goEditCommitment() {
  go('purpose');
  setTimeout(function() {
    var el = document.getElementById('sn-commit-wrap');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // Auto-open the edit form
    var form = document.getElementById('sn-commit-form');
    var btn  = document.querySelector('.sn-commit-edit-btn');
    if (form) form.style.display = 'block';
    if (btn)  btn.style.display  = 'none';
  }, 120);
}

function deleteCommitment(forDate) {
  const commits = getCommitments().filter(function(c) { return c.forDate !== forDate; });
  localStorage.setItem(COMMIT_KEY, JSON.stringify(commits));
  rPurpose();
}

function getTodayCommitment() {
  const commits = getCommitments();
  for (var i = 0; i < commits.length; i++) {
    if (commits[i].forDate === dk()) return commits[i];
  }
  return null;
}

        + '</div>'
        + '<div class="sn-commit-log-status ' + (followed ? 'ok' : 'miss') + '">' + (followed ? '✓' : '–') + '</div>'
        + '<div class="sn-commit-log-del" onclick="deleteCommitment(\'' + c.forDate + '\')">✕</div>'
        + '</div>';
    }).join('');
  } else {
    logRowsH = '<div style="font-size:11px;color:var(--t3);padding:6px 0">No commitments logged yet — save tonight\'s first.</div>';
  }

  const logCard = '<div class="ref-card" id="r-commit-log">'
    + '<div class="ref-hd" onclick="toggleRef(\'r-commit-log\')">'

  return commitCard + logCard;
}

function htEnsure() {

// Convert a date string "YYYY-MM-DD" → the Monday-starting weekKey that contains it
function dateToWeekKey(dateStr) {
  if (!dateStr) return '';
  const d   = new Date(dateStr + 'T12:00:00');
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(d.getFullYear(), d.getMonth(), diff);
  return mon.toISOString().slice(0, 10);
}

function htAddHours(delta) {
  htEnsure();
  const wk = wk_key();
  let entry = S.hestia.embodiedHoursLog.find(e => e.weekKey === wk);
  if (!entry) {
    entry = { weekKey: wk, hours: 0 };
    S.hestia.embodiedHoursLog.push(entry);
  }
  const before = entry.hours;
  entry.hours = Math.max(0, +(before + delta).toFixed(1));
  // Mark ht1 done when first logging hours this day (ht1 has xp:0 so no double-XP risk)
  if (delta > 0 && !done('ht1')) toggle('ht1');
  save();
  rHestia();
}

  htEnsure();
  const inp  = document.getElementById('ht-mm-note');

  const wk   = wk_key();
  // Check if already logged this week
  const already = S.hestia.maintenanceMoves.some(m => dateToWeekKey(m.date) === wk);
  if (already) { alert('Maintenance move already logged this week.'); return; }
  S.hestia.maintenanceMoves.push({ date: dk(), note });
  S.hestia.maintenanceMoves = S.hestia.maintenanceMoves.slice(-52);
  addXP('hestia', 15);
  // Mark ht2 done if not already
  if (!done('ht2')) toggle('ht2');
  save();
  rHestia();
}

function selectPillar(p) {
  _dwPillar = p;
  ['R','A','B'].forEach(k => {
    const el = document.getElementById('pp-' + k);
    if (el) el.classList.toggle('selected', k === p);

}

function selectLearnPillar(p) {
  _learnPillar = p;
  ['R','A','B'].forEach(k => {
    const el = document.getElementById('lp-' + k);
    if (el) el.classList.toggle('selected', k === p);
  });
}

function _closeAllCraftForms() {
  ['dw-form-wrap','learn-form-wrap','build-form-wrap'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
}

function expandDW() {
  const wrap = document.getElementById('dw-form-wrap');
  if (!wrap) return;
  const open = wrap.style.display !== 'none';
  _closeAllCraftForms();
  if (!open) {
    wrap.style.display = 'block';
    setTimeout(() => { document.getElementById('dw-focus')?.focus(); }, 50);
    restorePillarUI();
  }
}

function expandLearn() {
  const wrap = document.getElementById('learn-form-wrap');
  if (!wrap) return;
  const open = wrap.style.display !== 'none';
  _closeAllCraftForms();
  if (!open) {
    wrap.style.display = 'block';
    setTimeout(() => { document.getElementById('learn-cap')?.focus(); }, 50);
    restorePillarUI();
  }
}

function expandBuildLog() {
  const wrap = document.getElementById('build-form-wrap');
  if (!wrap) return;
  const open = wrap.style.display !== 'none';
  _closeAllCraftForms();
  if (!open) {
    wrap.style.display = 'block';
    setTimeout(() => { document.getElementById('build-log-inp')?.focus(); }, 50);
  }
}

function restorePillarUI() {
  if (_dwPillar)    selectPillar(_dwPillar);
  if (_learnPillar) selectLearnPillar(_learnPillar);
}

function _dwSessionsToday() {
  let sessions = [];
  try { sessions = JSON.parse(localStorage.getItem('sl_sessions') || '[]'); } catch(e) {}
  return sessions.filter(s => s.date === dk() && s.type === 'dw');
}

function _dwSprintXP(sprintNum) {
  // Sprint 1: 30 XP (90 min — floor, non-negotiable)
  // Sprint 2: 30 XP (90 min — target, same effort as Sprint 1)
  // Sprint 3+: 15 XP (45 min — excellence/bonus territory)
  if (sprintNum === 1) return 30;
  if (sprintNum === 2) return 30;
  return 15;
}

function _dwSprintTarget(sprintNum) {
  if (sprintNum === 1) return '90 min';
  if (sprintNum === 2) return '90 min';
  return '45 min';
}

function logDeepWork() {
  const focus = (document.getElementById('dw-focus')?.value || '').trim();
  if (!focus)       { alert('Add what you\'re working on first.'); return; }
  if (!_dwPillar)   { alert('Select a pillar first.'); return; }
  const sprintNum = _dwSessionsToday().length + 1;
  const xp = _dwSprintXP(sprintNum);
  _saveSession({ type:'dw', focus, pillar:_dwPillar, xp, sprint: sprintNum });
  addXP('craft', xp);
  _dwPillar = null;
  if (!done('cr1')) {
    const l = dayLog();
    l['cr1'] = true;
    S.log[dk()] = l;
    save();
  }
  rCraft();
}

function logLearning() {
  const focus = (document.getElementById('learn-cap')?.value || '').trim();
  if (!focus)         { alert('Add what you learned first.'); return; }
  if (!_learnPillar)  { alert('Select a pillar first.'); return; }
  _saveSession({ type:'learn', focus, pillar:_learnPillar });
  _learnPillar = null;
  if (!done('cr2')) toggle('cr2');
  rCraft();
}

function logBuildLog() {
  const focus = (document.getElementById('build-log-inp')?.value || '').trim();
  if (!focus) { alert('Add one sentence first.'); return; }
  _saveSession({ type:'buildlog', focus });
  if (!done('cr3')) toggle('cr3');
  rCraft();
}

function _saveSession(data) {
  const sessKey = 'sl_sessions';
  let sessions = [];
  try { sessions = JSON.parse(localStorage.getItem(sessKey) || '[]'); } catch(e) {}
  sessions.push({ date: dk(), ...data });
  if (sessions.length > 200) sessions = sessions.slice(-200);
  localStorage.setItem(sessKey, JSON.stringify(sessions));
}

      <div class="set-row">

      <div class="set-row">
        <div><div class="set-row-lbl">Lights Out Target</div><div class="set-row-sub">Final sleep target (11:30pm)</div></div>

      <div class="set-sec-ttl">Sleep System</div>

        <div>
          <div class="set-row-lbl">Somnus Tracker</div>
          <div class="set-row-sub">Log sleep, manage ramp &amp; emergency mode</div>
        </div>
        <div style="color:var(--t3)">›</div>
      </div>
      <div style="padding:6px 0 4px;font-size:11px;color:var(--t3);line-height:1.5">

      </div>
      <div class="set-row">
        <div>
          <div class="set-row-lbl">Debt override</div>
          <div class="set-row-sub">Manual fallback if Somnus not synced (min)</div>
        </div>
        <input type="number" class="set-inp" style="width:72px;text-align:right" min="0" max="600"
               value="${S.cfg.sleepDebt ?? ''}" placeholder="auto"

      </div>
      <div class="set-row">
        <div>
          <div class="set-row-lbl">Efficiency override</div>
          <div class="set-row-sub">Manual fallback — flag fires below 80%</div>
        </div>
        <input type="number" class="set-inp" style="width:72px;text-align:right" min="0" max="100"
               value="${S.cfg.sleepEff ?? ''}" placeholder="auto"
               onchange="setCfg('sleepEff', this.value !== '' ? parseInt(this.value) : null); rHome()">
      </div>
      <div class="set-row">
        <div>
          <div class="set-row-lbl">Consistency override</div>
          <div class="set-row-sub">Manual fallback — flag fires below 70%</div>
        </div>

    <div class="set-sec">

        <input type="url" class="set-inp" style="width:100%;font-size:12px"
               placeholder="https://notion.so/..."

               onchange="setCfg('pipelineUrl', this.value.trim())">

    <div class="set-sec">
      <div class="set-sec-ttl">Progress</div>
      <div class="set-row">
        <div class="set-row-lbl">Overall Streak</div>
        <div style="font-size:22px;font-weight:900;color:var(--t1)">${S.streaks.overall.n} 🔥</div>
      </div>
      <div class="set-row">
        <div class="set-row-lbl">Today's Completion</div>
        <div style="font-size:22px;font-weight:900;color:var(--t1)">${overallPct()}%</div>
      </div>
      <div class="set-row">
        <div class="set-row-lbl">Overall Rank</div>

      </div>

    <div class="set-sec">
      <div class="set-sec-ttl">Level Management</div>
      <div style="padding:4px 0 10px;font-size:12px;color:var(--t3);line-height:1.5">
        Level-up requires both gates: weekly XP target hit AND real-world outcome verified. See module docs to confirm gates before claiming.
      </div>
      ${[
        { mod:'physique', name:'Adonis',     col:'var(--physique)' },
        { mod:'vitality', name:'Somnus',     col:'var(--vitality)' },
        { mod:'apollo',   name:'Apollo',     col:'var(--presence)' },

        { mod:'purpose',  name:'Seneca',     col:'var(--purpose)'  },
      ].map(({ mod, name, col }) => {
        const lv    = S.levels?.[mod] || 1;
        const wxp   = getWeeklyXP(mod);
        const tgt   = XP_TARGETS[mod]?.[lv] || 0;
        const atTgt = tgt > 0 && wxp >= tgt;
        return `
        <div class="set-row">
          <div>
            <div class="set-row-lbl" style="color:${col}">${name}</div>
            <div class="set-row-sub">${wxp} XP this week${tgt > 0 ? ' · target ' + tgt : ''}</div>

            ${lv < 10 ? `<div onclick="promptLvUp('${mod}')"
              style="font-size:11px;font-weight:700;color:${atTgt?col:'var(--t3)'};cursor:pointer;padding:4px 10px;border-radius:8px;border:1px solid ${atTgt?col:'var(--border-b)'};background:${atTgt?`color-mix(in srgb, ${col} 10%, transparent)`:'var(--card)'}">
              ${atTgt ? `[ ▲ CLAIM ]` : lvStr(lv+1)}
            </div>` : '<div style="font-size:11px;color:var(--t3);letter-spacing:1px">[ MAX ]</div>'}
          </div>

      <div class="set-row" onclick="if(confirm('Reset ALL progress? This cannot be undone.'))resetD()" style="cursor:pointer">
        <div class="set-row-lbl" style="color:var(--danger)">Reset All Data</div>
        <div style="color:var(--danger)">›</div>

    <div class="footer-hint">
      [ SYSTEM v2.0 ] · SOLO LEVELING · APRIL 2026
    </div>

}

// ── Event handlers ─────────────────────────────────────────
function uncompleteSection(ids) {
  const l = dayLog();
  ids.forEach(id => { l[id] = false; });
  S.log[dk()] = l;
  recalcStreak();
  save();
  // Re-render current tab
  if      (cur === 'physique') rPhysique();
  else if (cur === 'vitality') rVitality();
  else if (cur === 'presence') rPresence();
  else if (cur === 'craft')    rCraft();
  else if (cur === 'purpose')  rPurpose();
  else if (cur === 'home')     rHome();
  else if (cur === 'modules')  rModules();
}

function tapTask(id) {
  const el = document.getElementById('ti-' + id);
  if (!el) return;
  const wasDone = done(id);
  toggle(id);
  const isDone = done(id);
  el.classList.toggle('done', isDone);
  el.classList.add('popping');
  setTimeout(() => el.classList.remove('popping'), 350);
  // XP toast on completion (not on undo)
  if (isDone && !wasDone) {
    const xpVal = TASK_XP[id] || 0;
    const mod   = TASK_MOD[id];
    xpToast(id, xpVal, mod ? COLS[mod] : '#fff');
  }
  // Live-refresh level bar on the module page
  const mod = TASK_MOD[id];
  if (mod && cur === mod) refreshLvBar(mod);
  // Update rings on home/modules if visible
  if (cur === 'home')    rHome();
  if (cur === 'modules') rModules();
}

function toggleRef(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

// ── Training Card ──
let _trTimer = null;
let _trTimerEl = null;

function trRestStart(e, sec, btnEl) {
  e.stopPropagation();
  if (_trTimerEl === btnEl && _trTimer) {
    clearInterval(_trTimer); _trTimer = null;
    btnEl.textContent = btnEl.dataset.orig; btnEl.className = 'tr-rest-btn'; _trTimerEl = null;
    return;
  }
  if (_trTimer) {
    clearInterval(_trTimer); _trTimer = null;
    if (_trTimerEl) { _trTimerEl.textContent = _trTimerEl.dataset.orig; _trTimerEl.className = 'tr-rest-btn'; }
  }
  _trTimerEl = btnEl;
  if (!btnEl.dataset.orig) btnEl.dataset.orig = btnEl.textContent;
  let remaining = sec;
  btnEl.className = 'tr-rest-btn active';
  function tick() {
    if (remaining <= 0) {
      clearInterval(_trTimer); _trTimer = null;
      btnEl.textContent = '✓ Go'; btnEl.className = 'tr-rest-btn done';
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      setTimeout(() => {
        if (_trTimerEl === btnEl) { btnEl.textContent = btnEl.dataset.orig; btnEl.className = 'tr-rest-btn'; _trTimerEl = null; }
      }, 3000);
      return;
    }
    const m = Math.floor(remaining / 60); const s = remaining % 60;
    btnEl.textContent = m + ':' + String(s).padStart(2,'0');
    remaining--;
  }
  tick(); _trTimer = setInterval(tick, 1000);
}

function trToggleCue(el) { el.classList.toggle('open'); }

function renderTrainingCard() {
  if (_trTimer) { clearInterval(_trTimer); _trTimer = null; _trTimerEl = null; }
  const dow = new Date().getDay();
  const session = TRAINING[dow];
  const dayName = DAYS[dow];
  const autoOpen = !!session && block() === 'afternoon';
  let bodyHtml = '';
  if (dow === 3) {
    bodyHtml = `<div class="tr-special">🏃 Run day — no lifting. Recovery between blocks.</div>`;
  } else if (dow === 0) {
    bodyHtml = `<div class="tr-special">🛌 Full rest day. Recovery is part of the program.</div>`;
  } else if (session) {
    const exHtml = session.ex.map((ex, i) => `
      <div class="tr-ex" onclick="trToggleCue(this)">
        <div class="tr-ex-hd">
          <div class="tr-ex-num">${i+1}</div>
          <div class="tr-ex-name">${ex.n}</div>
          <div class="tr-ex-meta">
            <span class="tr-sets">${ex.s}</span>
            <span class="tr-rir">${ex.rir}</span>
            <span class="tr-rest-btn" data-orig="${ex.rest}"
              onclick="trRestStart(event,${ex.sec},this)">${ex.rest}</span>
          </div>
        </div>
        <div class="tr-cue">${ex.cue}</div>
      </div>`).join('');
    bodyHtml = `
      <div class="tr-day-tag">${dayName} · ${session.focus}</div>
      ${exHtml}
      <div class="tr-hint">Tap exercise for cue · Tap rest time to start timer</div>`;
  }
  const ico = session ? session.emoji : (dow === 3 ? '🏃' : '🛌');
  const ttl = session
    ? `${session.name} <span style="color:var(--t3);font-size:12px;font-weight:500">— ${dayName}</span>`
    : `${dow === 3 ? 'Run Day' : 'Rest Day'} <span style="color:var(--t3);font-size:12px;font-weight:500">— ${dayName}</span>`;
  return `
    <div class="ref-card ${autoOpen ? 'open' : ''}" id="r-training">
      <div class="ref-hd" onclick="toggleRef('r-training')">
        <div class="ref-ico">${ico}</div>
        <div class="ref-ttl" style="color:var(--physique)">${ttl}</div>
        <div class="ref-toggle">⌄</div>
      </div>
      <div class="ref-body">${bodyHtml}</div>
    </div>`;
}

function logNight(status) {
  // Write status to Somnus state (source of truth)
  const ss = getSS();
  if (!ss) return;
  const yesterday = ssDaysAgo(1);
  if (!ss.data) ss.data = {};
  if (!ss.data[yesterday]) ss.data[yesterday] = {};
  ss.data[yesterday].status = status;
  ss.data[yesterday].auto   = false;
  writeSS(ss);
  // Re-render Vitality to reflect new status
  rVitality();
}

function logW() {
  const inp = document.getElementById('w-inp');
  const w   = parseFloat(inp?.value);
  if (!inp || isNaN(w)) return;
  const today = dk();
  const idx   = S.weight.findIndex(x => x.date === today);
  if (idx >= 0) S.weight[idx].w = w;
  else S.weight.push({ date: today, w });
  S.weight = S.weight.slice(-90);
  save();
  const disp = document.getElementById('w-disp');
  if (disp) disp.textContent = w + ' lbs';
  inp.value = '';
  inp.placeholder = w + ' lbs';
}

function setCfg(k, v) {
  S.cfg[k] = v;
  save();
}


function exportD() {
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `solo-leveling-${dk()}.json`
  });
  a.click();
}

function resetD() {
  localStorage.removeItem(KEY);
  S = defaultState();
  save();
  go('home');
}

// ── Live clock ─────────────────────────────────────────────
function tickClock() {
  const el = document.getElementById('live-clock');
  if (el) el.textContent = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

// ── Init ───────────────────────────────────────────────────
(function init() {
  const app = document.getElementById('app');
  ['home','modules','physique','vitality','presence','apollo','hestia','craft','purpose','settings'].forEach(id => {
    const d = document.createElement('div');
    d.id = 's-' + id;
    d.className = 'screen' + (id === 'home' ? ' active' : '');
    app.appendChild(d);
  });

  rHome();

  setInterval(tickClock, 30000);

  // Pull-to-refresh
  (function pullToRefresh() {
    let startY = 0, pulling = false;
    const threshold = 72;
    let indicator = null;

    function getIndicator() {
      if (!indicator) {
        indicator = document.createElement('div');
        indicator.id = 'ptr-indicator';
        indicator.style.cssText = `
          position:fixed; top:0; left:0; right:0; z-index:9999;
          display:flex; align-items:center; justify-content:center;
          height:0; overflow:hidden; transition:height .2s ease;
          background:rgba(6,6,16,.95);
          font-size:12px; font-weight:700; letter-spacing:1px;
          color:rgba(168,85,247,.8); text-transform:uppercase;
        `;
        document.body.appendChild(indicator);
      }
      return indicator;
    }

    document.addEventListener('touchstart', e => {
      const activeScreen = document.querySelector('.screen.active');
      if (activeScreen && activeScreen.scrollTop === 0) {
        startY = e.touches[0].clientY;
        pulling = true;
      }
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (!pulling) return;
      const dy = e.touches[0].clientY - startY;
      if (dy <= 0) { pulling = false; return; }
      const ind = getIndicator();
      const pct = Math.min(dy / threshold, 1);
      ind.style.height = Math.min(dy * 0.4, 44) + 'px';
      ind.textContent = pct >= 1 ? '↑ Release to refresh' : '↓ Pull to refresh';
      ind.style.color = pct >= 1 ? 'rgba(0,212,160,.9)' : 'rgba(168,85,247,.7)';
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (!pulling) return;
      pulling = false;
      const dy = e.changedTouches[0].clientY - startY;
      const ind = getIndicator();
      if (dy >= threshold) {
        ind.textContent = '↺ Refreshing...';
        ind.style.height = '44px';
        setTimeout(() => window.location.reload(true), 300);
      } else {
        ind.style.height = '0';
      }
    }, { passive: true });
  })();

  // Midnight reset check
  (function midCheck() {
    const n = new Date();
    if (n.getHours() === 0 && n.getMinutes() < 2) recalcStreak();
    setTimeout(midCheck, 60000);
  })();
})();
</script>
