<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="THE SYSTEM">
<meta name="theme-color" content="#050010">
<title>THE SYSTEM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THE SYSTEM — Design System v3 (Arise · Shadow Monarch)
   ============================================================ */
:root {
  /* Backgrounds — deep void, shadow realm */
  --bg:       #050010;
  --surface:  #08001A;
  --card:     #0D0520;
  --card-hi:  #130828;
  --border:   #1A0840;
  --border-b: #2D1260;

  /* Text */
  --t1: #EDE8FF;
  --t2: #6650A4;
  --t3: #2D1A55;

  /* Stat accent colors */
  --physique:  #00D4A0;
  --vitality:  #FFA940;
  --presence:  #C084FC;
  --craft:     #FF5555;
  --purpose:   #A855F7;

  /* System primary — Arise Purple */
  --sys:       #A855F7;
  --sys-core:  #7B2FBE;
  --sys-dim:   #4C1D95;

  /* Glow versions (for box-shadow / filter) */
  --glow-physique: rgba(0,212,160,0.45);
  --glow-vitality: rgba(255,169,64,0.45);
  --glow-presence: rgba(192,132,252,0.45);
  --glow-craft:    rgba(255,85,85,0.45);
  --glow-purpose:  rgba(168,85,247,0.55);
  --glow-sys:      rgba(168,85,247,0.5);
  --glow-white:    rgba(232,220,255,0.2);

  /* Dynamic awakening — JS-driven, 0=dawn(blue) → 1=arise(purple) */
  --awaken: 0;

  /* Status */
  --success: #1FBF58;
  --warning: #F59E0B;
  --danger:  #EF4444;
  --info:    #38BDF8;

  /* Spacing & shape */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;

  --nav-h: 70px;
  --safe-b: env(safe-area-inset-bottom, 0px);

  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  --font-display: 'Rajdhani', 'SF Pro Display', sans-serif;
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--t1);
  font-family: var(--font);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  overscroll-behavior: none;
}

/* Subtle grid texture — the System overlay */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(168,85,247,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,85,247,0.045) 1px, transparent 1px);
  background-size: 38px 38px;
}

/* ===== LAYOUT ===== */
#app { width: 100%; height: 100%; overflow: hidden; position: relative; z-index: 1; }

.screen {
  position: absolute;
  inset: 0;
  bottom: calc(var(--nav-h) + var(--safe-b));
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
  transition: opacity .22s ease, transform .22s ease;
  padding-bottom: 32px;
}

.screen.active {
  opacity: 1; pointer-events: all; transform: translateY(0);
}

.wrap { max-width: 430px; margin: 0 auto; padding: 0 16px; }

/* ===== BOTTOM NAV ===== */
#nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-b));
  padding-bottom: var(--safe-b);
  background: rgba(5,0,16,0.97);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  padding-top: 10px;
  z-index: 200;
}

.ni {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 2px 0;
  cursor: pointer;
  -webkit-user-select: none; user-select: none;
  transition: opacity .15s;
}
.ni:active { opacity: .7; }

.ni-ico { font-size: 22px; line-height: 1; transition: filter .2s; }
.ni-lbl {
  font-size: 10px; font-weight: 700; letter-spacing: .6px;
  color: var(--t3); text-transform: uppercase; transition: color .2s;
}
.ni.active .ni-lbl { color: var(--t1); }
.ni-pip {
  width: 20px; height: 2px; border-radius: 1px;
  background: transparent; transition: background .2s, box-shadow .2s;
}
.ni.active .ni-pip {
  background: var(--t1);
  box-shadow: 0 0 8px var(--glow-white);
}

/* ===== HOME SCREEN ===== */
.h-header {
  padding: 20px 0 6px;
  display: flex; align-items: flex-start; justify-content: space-between;
}
.h-system {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  color: var(--purpose); text-transform: uppercase;
  margin-bottom: 4px; opacity: .8;
  font-family: var(--font-display);
  animation: sysGlow 3s ease-in-out infinite;
}
.h-greeting { font-size: 12px; color: var(--t2); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.h-date     { font-size: 22px; font-weight: 800; color: var(--t1); line-height: 1.2; font-family: var(--font-display); letter-spacing: .5px; }
.h-time     { font-size: 14px; color: var(--t1); font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }
.h-block    { font-size: 10px; color: var(--t3); font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-top: 3px; text-align: right; }

/* Overall ring */
.oring-wrap {
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 0 14px;
}
.oring-rel { position: relative; display: inline-flex; align-items: center; justify-content: center; }
.oring-txt { position: absolute; text-align: center; }
.oring-pct { font-size: 32px; font-weight: 700; color: var(--t1); line-height: 1; font-family: var(--font-display); letter-spacing: 1px; }
.oring-lbl { font-size: 10px; color: var(--t2); font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-top: 2px; }

.streak-pill {
  margin-top: 12px;
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--border-b);
  padding: 7px 18px; border-radius: 20px;
  transition: border-color .3s, box-shadow .3s;
}
.streak-pill.lit {
  border-color: rgba(255,169,64,0.5);
  box-shadow: 0 0 14px rgba(255,169,64,0.18), inset 0 0 20px rgba(255,169,64,0.04);
}
.streak-pill span { font-size: 15px; }
.streak-n { font-size: 16px; font-weight: 700; color: var(--t1); font-variant-numeric: tabular-nums; font-family: var(--font-display); letter-spacing: .5px; }
.streak-w { font-size: 12px; color: var(--t2); font-weight: 600; }

/* Deep work daily bar */
.dw-bar-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 11px 14px;
  margin-bottom: 12px; transition: border-color .3s, box-shadow .3s;
}
.dw-bar-wrap.dw-floor  { border-color: rgba(245,158,11,.35); }
.dw-bar-wrap.dw-target { border-color: rgba(0,200,150,.35); }
.dw-bar-wrap.dw-elite  {
  border-color: rgba(168,85,247,.5);
  box-shadow: 0 0 18px rgba(168,85,247,.12);
}
.dw-bar-hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.dw-bar-lbl { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--t3); }
.dw-bar-status { font-size: 11px; font-weight: 700; }
.dw-bar-track {
  height: 5px; background: var(--border-b); border-radius: 3px;
  overflow: hidden; margin-bottom: 7px;
}
.dw-bar-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
.dw-bar-pips { display: flex; gap: 6px; }
.dw-bar-pip {
  flex: 1; text-align: center; font-size: 10px; font-weight: 600;
  color: var(--t3); padding: 3px 0;
  border-radius: 5px; background: var(--border-b);
  transition: background .3s, color .3s;
}
.dw-bar-pip.done { color: var(--t1); }
.dw-bar-pip.pip-floor  { background: rgba(245,158,11,.15); color: var(--warning); }
.dw-bar-pip.pip-target { background: rgba(0,200,150,.15); color: var(--success); }
.dw-bar-pip.pip-elite  { background: rgba(168,85,247,.15); color: var(--sys); }

/* Now banner */
.now-banner {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 13px 15px;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 12px;
  animation: slideUp .25s ease;
  position: relative; overflow: hidden;
}
.now-banner::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--border-b); border-radius: 0 2px 2px 0;
}
.now-banner.urgent {
  border-color: rgba(245,158,11,.3);
  box-shadow: 0 0 20px rgba(245,158,11,.06);
}
.now-banner.urgent::before { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
.now-banner.clear  {
  border-color: rgba(31,191,88,.2);
  box-shadow: 0 0 20px rgba(31,191,88,.05);
}
.now-banner.clear::before { background: var(--success); }
.nb-ico { font-size: 22px; flex-shrink: 0; }
.nb-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--t3); }
.nb-ttl { font-size: 14px; font-weight: 700; color: var(--t1); margin-top: 2px; }

/* Stat cards */
.stat-cards { display: flex; flex-direction: column; gap: 9px; }

.sc {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 15px 15px 15px 20px;
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  position: relative; overflow: hidden;
  transition: background .15s, border-color .2s, box-shadow .2s;
  -webkit-user-select: none; user-select: none;
  animation: slideUp .3s ease both;
}
.sc::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--sc-color, #fff);
  box-shadow: 0 0 10px var(--sc-color, #fff);
  border-radius: 0 2px 2px 0;
}
.sc:active {
  background: var(--card-hi);
  border-color: var(--sc-color);
  box-shadow: 0 0 18px color-mix(in srgb, var(--sc-color) 100%, transparent 65%);
}
.sc-info { flex: 1; min-width: 0; }
.sc-stat { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--sc-color); opacity: .85; }
.sc-mod  { font-size: 17px; font-weight: 800; color: var(--t1); margin-top: 1px; }
.sc-sub  { font-size: 12px; color: var(--t2); margin-top: 3px; }
.sc-due  { font-size: 12px; font-weight: 700; color: var(--warning); margin-top: 3px; }
.sc-done { font-size: 12px; font-weight: 700; color: var(--success); margin-top: 3px; }
.sc-arrow { color: var(--t3); font-size: 18px; flex-shrink: 0; }
.cs-badge {
  display: inline-block; margin-top: 4px;
  background: var(--border); color: var(--t3);
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  padding: 2px 8px; border-radius: 10px;
}

/* ===== TODAY LIST ===== */
.tod-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }

.tod-block {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); overflow: hidden;
  animation: slideUp .25s ease both;
}
.tod-active-block {
  border-color: rgba(255,255,255,0.12);
  box-shadow: 0 0 18px rgba(255,255,255,0.04);
}
.tod-block-hd {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px 8px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
}
.tod-block-ico { font-size: 14px; }
.tod-block-lbl { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--t2); flex: 1; }
.tod-block-prog { font-size: 11px; font-weight: 700; color: var(--t3); font-variant-numeric: tabular-nums; font-family: var(--font-display); }

.tod-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .12s, opacity .2s;
  -webkit-user-select: none; user-select: none;
}
.tod-row:last-child { border-bottom: none; }
.tod-row:active { background: var(--card-hi); }
.tod-row.tod-done { opacity: .38; }
.tod-row.tod-done .tod-name { text-decoration: line-through; color: var(--t3); }

.tod-check {
  width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
  border: 2px solid var(--tc, #fff);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; color: var(--tc, #fff);
  transition: background .15s, transform .15s;
}
.tod-checked { background: var(--tc, #fff); color: #0a0a14; transform: scale(1.1); }
.tod-arrow { border-color: var(--tc, #fff); color: var(--tc, #fff); font-size: 18px; font-weight: 300; line-height: 1; }

.tod-info { flex: 1; min-width: 0; }
.tod-name { font-size: 14px; font-weight: 600; color: var(--t1); line-height: 1.3; transition: color .2s; }
.tod-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
.tod-mod-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
.tod-xp { font-size: 10px; font-weight: 700; color: var(--t3); letter-spacing: .5px; font-family: var(--font-display); }
.tod-xp-done { font-size: 10px; font-weight: 700; color: var(--t3); letter-spacing: .5px; font-family: var(--font-display); opacity: .5; }

/* Block complete state */
.tod-block-hd.blk-complete .tod-block-lbl { color: var(--t1); }
.tod-block-hd.blk-complete .tod-block-prog { color: #00D4A0; }

/* XP float toast */
.xp-toast {
  position: fixed; pointer-events: none; z-index: 9999;
  font-size: 13px; font-weight: 800; letter-spacing: .5px;
  color: #00D4A0; font-family: var(--font-display);
  transform: translateX(-50%);
  animation: xp-float .75s ease-out forwards;
}
@keyframes xp-float {
  0%   { opacity: 1; transform: translateX(-50%) translateY(0);     }
  100% { opacity: 0; transform: translateX(-50%) translateY(-36px); }
}
.save-toast {
  position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%);
  background: #00D4A0; color: #0a0a14;
  font-size: 13px; font-weight: 800; letter-spacing: .3px;
  padding: 10px 22px; border-radius: 20px;
  pointer-events: none; z-index: 9999; white-space: nowrap;
  animation: save-toast-anim 1.8s ease-out forwards;
}
@keyframes save-toast-anim {
  0%   { opacity: 0; transform: translateX(-50%) translateY(8px);  }
  12%  { opacity: 1; transform: translateX(-50%) translateY(0);    }
  75%  { opacity: 1; transform: translateX(-50%) translateY(0);    }
  100% { opacity: 0; transform: translateX(-50%) translateY(-4px); }
}

/* Today commitment callout */
.tod-commit-callout {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px 11px;
  background: color-mix(in srgb, var(--purpose) 8%, transparent);
  border-bottom: 1px solid color-mix(in srgb, var(--purpose) 20%, transparent);
}
.tod-commit-ico  { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.tod-commit-lbl  { font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--purpose); margin-bottom: 3px; }
.tod-commit-task { font-size: 14px; font-weight: 700; color: var(--t1); line-height: 1.3; }
.tod-commit-time { font-size: 11px; font-weight: 700; color: var(--purpose); margin-top: 3px; letter-spacing: .3px; }
.tod-commit-edit { font-size: 10px; font-weight: 800; color: var(--purpose); opacity: .6; flex-shrink: 0; padding: 2px 0; cursor: pointer; letter-spacing: .5px; -webkit-user-select:none; user-select:none; }
.tod-commit-edit:active { opacity: 1; }

/* Seneca commitment capture card */
.sn-commit-card {
  background: var(--card); border: 1px solid color-mix(in srgb, var(--purpose) 30%, transparent);
  border-radius: var(--r-lg); padding: 14px 15px; margin-bottom: 10px;
}
.sn-commit-hd {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 12px;
}
.sn-commit-saved       { margin-bottom: 10px; }
.sn-commit-saved-lbl   { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--t3); margin-bottom: 6px; }
.sn-commit-task        { font-size: 15px; font-weight: 700; color: var(--t1); line-height: 1.3; }
.sn-commit-time        { font-size: 12px; font-weight: 700; color: var(--purpose); margin-top: 4px; }
.sn-commit-edit-btn {
  margin-top: 8px; background: transparent;
  border: 1px solid var(--border); color: var(--t2);
  font-size: 11px; font-weight: 700; padding: 5px 14px; border-radius: 8px; cursor: pointer;
}

/* Commitment log */
.sn-commit-log-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.sn-commit-log-row:last-child { border-bottom: none; }
.sn-commit-log-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
}
.sn-commit-log-dot.followed { background: var(--success); box-shadow: 0 0 6px var(--success); }
.sn-commit-log-dot.missed   { background: var(--border-b); }
.sn-commit-log-date  { font-size: 10px; color: var(--t3); font-weight: 700; letter-spacing: .5px; margin-bottom: 2px; }
.sn-commit-log-task  { font-size: 13px; color: var(--t1); font-weight: 600; line-height: 1.3; }
.sn-commit-log-time  { font-size: 11px; color: var(--purpose); font-weight: 600; margin-top: 2px; }
.sn-commit-log-status { font-size: 13px; font-weight: 800; flex-shrink: 0; margin-top: 2px; }
.sn-commit-log-status.ok   { color: var(--success); }
.sn-commit-log-status.miss { color: var(--border-b); }
.sn-commit-log-del {
  font-size: 14px; color: var(--t3); flex-shrink: 0;
  padding: 2px 4px; margin-top: 0; cursor: pointer; opacity: .5;
  -webkit-user-select: none; user-select: none;
}
.sn-commit-log-del:active { opacity: 1; color: var(--danger, #ff4d4d); }

/* ===== MODULE HEADER ===== */
.mod-header {
  padding: 18px 0 12px;
  display: flex; align-items: center; gap: 12px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--t2); cursor: pointer; flex-shrink: 0;
  transition: border-color .15s, color .15s;
  -webkit-user-select: none; user-select: none;
}
.back-btn:active { border-color: var(--sc-color); color: var(--t1); }
.mod-ttl-g { flex: 1; }
.mod-stat-nm {
  font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--sc-color, var(--t2)); opacity: .85;
}
.mod-name {
  font-size: 28px; font-weight: 700; line-height: 1.1;
  font-family: var(--font-display); letter-spacing: 1.5px;
  background: linear-gradient(135deg, var(--t1) 30%, var(--sc-color, var(--t2)) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ===== PROTOCOL SECTIONS ===== */
.proto-sec { margin-bottom: 20px; }

.sec-hd {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.sec-ico { font-size: 14px; }
.sec-ttl { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--t2); }
.sec-badge { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--t3); }
.sec-tag-now {
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(245,158,11,.1); color: var(--warning);
  border: 1px solid rgba(245,158,11,.3);
  font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px;
  padding: 3px 8px; border-radius: 8px;
  animation: pulseTag 2s ease-in-out infinite;
}

/* Task items */
.ck-list { display: flex; flex-direction: column; gap: 7px; }

.ti {
  display: flex; align-items: flex-start; gap: 11px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 13px;
  cursor: pointer;
  transition: opacity .3s, border-color .2s, background .12s, box-shadow .2s;
  -webkit-user-select: none; user-select: none;
}
.ti:active { background: var(--card-hi); }
.ti.done {
  opacity: .38;
  border-color: transparent;
}
.ti.done .ti-name { text-decoration: line-through; color: var(--t3); }
.ti.done .ti-box {
  box-shadow: 0 0 8px var(--sc-color, var(--success));
}
.ti.done .dw-bonus-btn,
.ti.done #dw-form-wrap { opacity: 1; }

.ti-box {
  width: 24px; height: 24px; flex-shrink: 0;
  border: 2px solid var(--border-b); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: background .18s, border-color .18s, box-shadow .18s;
  margin-top: 1px;
}
.ti.done .ti-box {
  background: var(--sc-color, var(--success));
  border-color: var(--sc-color, var(--success));
}
.ti-chk {
  opacity: 0; font-size: 13px; color: #000;
  transform: scale(.3);
  transition: opacity .15s, transform .2s cubic-bezier(.34,1.56,.64,1);
  font-weight: 900;
}
.ti.done .ti-chk { opacity: 1; transform: scale(1); }

.ti-cnt { flex: 1; min-width: 0; }
.ti-name { font-size: 15px; font-weight: 600; color: var(--t1); line-height: 1.3; }
.ti-note { font-size: 12px; color: var(--t2); margin-top: 3px; line-height: 1.4; }
.ti-xp {
  font-size: 11px; font-weight: 700; letter-spacing: .8px;
  font-family: var(--font-display);
  color: var(--t3); flex-shrink: 0; padding-top: 3px;
  transition: color .2s;
}
.ti.done .ti-xp { color: var(--sc-color, var(--success)); opacity: 0.7; }

/* Floating XP toast */
@keyframes xpFloat {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  15%  { opacity: 1; transform: translateY(-4px) scale(1.08); }
  100% { opacity: 0; transform: translateY(-28px) scale(0.95); }
}

/* Progress bar */
.prog-bar {
  height: 2px; background: var(--border); border-radius: 2px;
  margin-top: 10px; overflow: visible;
}
.prog-fill {
  height: 100%; border-radius: 2px; transition: width .5s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 8px var(--sc-color, #fff);
}

/* All-done state */
.sec-done {
  background: rgba(31,191,88,.05); border: 1px solid rgba(31,191,88,.2);
  border-radius: var(--r-md); padding: 14px;
  text-align: center; font-size: 13px; font-weight: 800;
  color: var(--success); letter-spacing: .5px;
  text-transform: uppercase; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.sec-done .sec-done-undo {
  font-size: 10px; font-weight: 600; color: var(--t3);
  letter-spacing: .3px; text-transform: uppercase; opacity: .7;
}

/* ===== REFERENCE CARDS ===== */
.ref-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md); overflow: hidden; margin-top: 8px;
}
.ref-hd {
  padding: 13px 14px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; -webkit-user-select: none; user-select: none;
}
.ref-ico { font-size: 14px; }
.ref-ttl { flex: 1; font-size: 14px; font-weight: 600; color: var(--t2); }
.ref-toggle { font-size: 14px; color: var(--t3); transition: transform .2s; }
.ref-card.open .ref-toggle { transform: rotate(180deg); }
.ref-body { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); }
.ref-card.open .ref-body { display: block; }

/* ===== TRAINING REFERENCE CARD ===== */
.tr-ex { border-bottom: 1px solid var(--border); }
.tr-ex:last-child { border-bottom: none; }
.tr-ex-hd {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 0; cursor: pointer;
  -webkit-user-select: none; user-select: none;
}
.tr-ex-num {
  min-width: 20px; height: 20px; border-radius: 50%;
  background: var(--border); display: flex; align-items: center;
  justify-content: center; font-size: 10px; font-weight: 700;
  color: var(--t2); flex-shrink: 0;
}
.tr-ex-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--t1); line-height: 1.3; }
.tr-ex-meta { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.tr-sets { font-size: 11px; font-weight: 700; color: var(--physique); white-space: nowrap; }
.tr-rir {
  font-size: 10px; padding: 2px 5px; border-radius: 4px;
  background: rgba(0,212,160,0.1); color: var(--physique); white-space: nowrap;
}
.tr-rest-btn {
  font-size: 10px; padding: 2px 7px; border-radius: 4px;
  background: var(--card-hi); color: var(--t2);
  border: 1px solid var(--border); cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
  min-width: 52px; text-align: center;
  -webkit-user-select: none; user-select: none; white-space: nowrap;
}
.tr-rest-btn.active {
  background: rgba(0,212,160,0.15); color: var(--physique);
  border-color: rgba(0,212,160,0.35); font-weight: 700;
}
.tr-rest-btn.done {
  background: rgba(31,191,88,0.15); color: var(--success);
  border-color: rgba(31,191,88,0.35);
}
.tr-cue {
  display: none; font-size: 12px; color: var(--t2);
  padding: 0 0 11px 28px; line-height: 1.55; font-style: italic;
}
.tr-ex.open .tr-cue { display: block; }
.tr-day-tag {
  font-size: 11px; color: var(--t3); font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 10px 0 8px;
}
.tr-hint {
  padding: 10px 0 2px; text-align: center;
  font-size: 11px; color: var(--t3);
}
.tr-special {
  padding: 16px 0; text-align: center; color: var(--t2); font-size: 13px;
}

.ref-step { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.ref-step:last-child { border-bottom: none; }
.ref-sn {
  min-width: 22px; height: 22px; border-radius: 50%;
  background: var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--t2); flex-shrink: 0; margin-top: 1px;
}
.ref-st { font-size: 13px; color: var(--t2); line-height: 1.45; }
.reading-phase-lbl { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; opacity: .7; padding: 10px 0 4px; }

/* ===== FITNESS CARD ===== */
.fit-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 16px; margin-top: 6px;
}
.fit-hd {
  font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
  color: var(--t2); margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
}
.fit-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.fit-row:last-of-type { border-bottom: none; }
.fit-lbl { font-size: 13px; color: var(--t2); }
.fit-val { font-size: 14px; font-weight: 700; color: var(--t1); }
.fit-val.hi { color: var(--physique); text-shadow: 0 0 10px var(--glow-physique); }

.w-row { display: flex; gap: 8px; margin-top: 14px; }
.w-inp {
  flex: 1; background: var(--surface); border: 1px solid var(--border-b);
  border-radius: var(--r-sm); padding: 10px 12px;
  color: var(--t1); font-size: 16px; font-family: var(--font);
  transition: border-color .15s;
}
.w-inp:focus { outline: none; border-color: var(--physique); box-shadow: 0 0 0 3px rgba(0,212,160,.1); }
.w-btn {
  background: var(--physique); color: #000; font-weight: 800; font-size: 14px;
  padding: 10px 18px; border: none; border-radius: var(--r-sm); cursor: pointer;
  box-shadow: 0 0 14px var(--glow-physique);
  -webkit-user-select: none; user-select: none;
  transition: opacity .15s;
}
.w-btn:active { opacity: .8; }

/* ===== SLEEP MODULE ===== */
.sl-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 16px; margin-bottom: 14px;
}
.sl-ttl { font-size: 13px; font-weight: 700; color: var(--t1); margin-bottom: 12px; }
.sl-btns { display: flex; gap: 8px; }
.sl-btn {
  flex: 1; padding: 11px 8px; border: 1px solid var(--border-b);
  border-radius: var(--r-sm); background: var(--surface);
  color: var(--t2); font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all .15s; text-align: center;
  -webkit-user-select: none; user-select: none;
}
.sl-btn.sg {
  background: rgba(255,169,64,.1); border-color: var(--vitality);
  color: var(--vitality); box-shadow: 0 0 12px rgba(255,169,64,.2);
}
.sl-btn.so { background: rgba(255,255,255,.05); border-color: var(--t2); color: var(--t1); }
.sl-btn.sb {
  background: rgba(239,68,68,.1); border-color: var(--danger);
  color: var(--danger);
}

/* Metric inputs */
.met-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
.met-col { flex: 1; min-width: 76px; }
.met-lbl { font-size: 11px; color: var(--t3); margin-bottom: 4px; font-weight: 600; }
.met-inp {
  width: 100%; background: var(--surface); border: 1px solid var(--border-b);
  border-radius: 6px; padding: 8px 10px;
  color: var(--t1); font-size: 14px; font-family: var(--font);
}
.met-inp:focus { outline: none; border-color: var(--vitality); }
.met-save {
  width: 100%; margin-top: 10px;
  background: var(--vitality); color: #000; font-weight: 800; font-size: 13px;
  padding: 10px; border: none; border-radius: 8px; cursor: pointer;
  box-shadow: 0 0 14px var(--glow-vitality);
}

/* Heatmap */
.hm-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 16px;
}
.hm-dlbls {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 5px;
}
.hm-dl { font-size: 9px; text-align: center; color: var(--t3); font-weight: 700; }
.hm-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.hm-d { aspect-ratio: 1; border-radius: 3px; background: var(--border); }
.hm-d.g { background: var(--vitality); box-shadow: 0 0 6px rgba(255,169,64,.5); }
.hm-d.ok { background: rgba(255,169,64,.3); }
.hm-d.b { background: var(--danger); opacity: .5; }
.hm-d.empty { background: transparent; }
.hm-legend {
  display: flex; gap: 12px; justify-content: center; margin-top: 12px;
}
.hm-li { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--t2); }
.hm-li-dot { width: 10px; height: 10px; border-radius: 2px; }

/* Emergency banner */
.emrg {
  background: rgba(239,68,68,.07); border: 1px solid rgba(239,68,68,.4);
  border-radius: var(--r-md); padding: 14px 15px; margin-bottom: 14px;
  display: flex; align-items: flex-start; gap: 10px;
  box-shadow: 0 0 24px rgba(239,68,68,.08);
  animation: slideUp .3s ease;
}
.emrg-ico { font-size: 20px; flex-shrink: 0; }
.emrg-ttl { font-size: 13px; font-weight: 800; color: var(--danger); text-transform: uppercase; letter-spacing: .5px; }
.emrg-body { font-size: 12px; color: var(--t2); margin-top: 4px; line-height: 1.6; }

/* Ramp status card */
.ramp-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 14px; margin-bottom: 14px;
}
.ramp-ttl {
  font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--t3); margin-bottom: 10px;
}
.ramp-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.ramp-row:last-child { border-bottom: none; }
.ramp-lbl { font-size: 13px; color: var(--t2); }
.ramp-val { font-size: 14px; font-weight: 700; color: var(--t1); }
.ramp-val.ok { color: var(--vitality); text-shadow: 0 0 8px var(--glow-vitality); }
.ramp-val.warn { color: var(--warning); }

/* ===== SETTINGS ===== */
.set-sec { margin-bottom: 24px; }
.set-sec-ttl {
  font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--t3); margin-bottom: 10px; padding: 0 4px;
}
.set-row {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 14px 15px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px; cursor: pointer;
  transition: border-color .15s, background .15s;
}
.set-row:active { background: var(--card-hi); }
.set-row-lbl { flex: 1; font-size: 15px; font-weight: 600; color: var(--t1); }
.set-row-sub { font-size: 12px; color: var(--t2); margin-top: 2px; }
.set-inp {
  background: var(--surface); border: 1px solid var(--border-b);
  border-radius: 6px; padding: 6px 10px;
  color: var(--t1); font-size: 15px; font-family: var(--font);
  width: 100px; text-align: center; cursor: pointer;
}
.set-inp:focus { outline: none; border-color: var(--sys); box-shadow: 0 0 0 3px rgba(168,85,247,.12); }
select.set-inp { width: auto; }

.toggle-wrap { display: flex; align-items: center; gap: 8px; }
.toggle-lbl { font-size: 12px; font-weight: 700; }
.toggle {
  width: 44px; height: 26px; border-radius: 13px;
  position: relative; cursor: pointer;
  transition: background .2s;
  -webkit-user-select: none; user-select: none;
}
.toggle-knob {
  width: 22px; height: 22px; border-radius: 50%; background: white;
  position: absolute; top: 2px; transition: left .2s;
  box-shadow: 0 1px 4px rgba(0,0,0,.5);
}

/* ===== APOLLO MODULE ===== */
.apollo-pipe-btn {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(168,85,247,.10); border: 1px solid rgba(168,85,247,.35);
  border-radius: var(--r-lg); padding: 14px 16px;
  margin-bottom: 8px; cursor: pointer;
  -webkit-user-select: none; user-select: none;
  transition: background .15s, border-color .2s;
}
.apollo-pipe-btn:active { background: rgba(168,85,247,.18); border-color: rgba(168,85,247,.6); }
.apollo-pipe-ico { font-size: 18px; flex-shrink: 0; }
.apollo-pipe-info { flex:1; padding: 0 12px; }
.apollo-pipe-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--presence); opacity:.8; }
.apollo-pipe-ttl { font-size: 15px; font-weight: 700; color: var(--t1); margin-top: 1px; }
.apollo-pipe-sub { font-size: 12px; color: var(--t2); margin-top: 2px; }
.apollo-pipe-arrow { color: var(--presence); font-size: 18px; opacity:.7; }

.apollo-ref-sep {
  display: flex; align-items: center; gap: 10px;
  margin: 20px 0 10px;
}
.apollo-ref-sep-line { flex:1; height:1px; background: var(--border); }
.apollo-ref-sep-lbl { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; color: var(--t3); text-transform: uppercase; }

.princ-item {
  padding: 12px 0; border-bottom: 1px solid var(--border);
  display: flex; gap: 11px; align-items: flex-start;
}
.princ-item:last-child { border-bottom: none; padding-bottom: 4px; }
.princ-num {
  min-width: 22px; height: 22px; border-radius: 50%;
  background: rgba(168,85,247,.15); border: 1px solid rgba(168,85,247,.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; color: var(--presence);
  flex-shrink: 0; margin-top: 1px; font-family: var(--font-display);
}
.princ-body { flex: 1; }
.princ-name { font-size: 13px; font-weight: 700; color: var(--t1); margin-bottom: 3px; }
.princ-desc { font-size: 12px; color: var(--t2); line-height: 1.5; margin-bottom: 5px; }
.princ-op {
  font-size: 11px; color: var(--presence); font-style: italic; line-height: 1.5;
  background: rgba(168,85,247,.07); border-left: 2px solid rgba(168,85,247,.4);
  padding: 5px 8px; border-radius: 0 4px 4px 0;
}
.princ-fail { font-size: 11px; color: var(--t3); line-height: 1.5; margin-top: 5px; }

.sig-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.sig-table th {
  font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
  color: var(--t3); text-align: left; padding: 0 8px 8px 0;
}
.sig-table td { font-size: 12px; padding: 6px 8px 6px 0; vertical-align: top; line-height: 1.4; border-bottom: 1px solid var(--border); }
.sig-table tr:last-child td { border-bottom: none; }
.sig-g { color: #1FBF58; font-weight: 800; }
.sig-y { color: var(--warning); font-weight: 800; }
.sig-r { color: var(--danger); font-weight: 800; }

.hes-rule {
  margin-top: 12px; padding: 10px 12px;
  background: rgba(168,85,247,.07); border: 1px solid rgba(168,85,247,.2);
  border-radius: var(--r-sm); font-size: 12px; color: var(--t2); line-height: 1.5;
}
.hes-rule strong { color: var(--presence); }

.text-rule { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--t2); line-height: 1.4; }
.text-rule:last-child { border-bottom: none; }
.text-rule strong { color: var(--t1); font-weight: 700; }
.text-template {
  margin-top: 10px; padding: 10px 12px;
  background: rgba(168,85,247,.07); border: 1px solid rgba(168,85,247,.2);
  border-radius: var(--r-sm); font-size: 12px; color: var(--t1); line-height: 1.6;
  font-style: italic;
}

.predate-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.predate-item:last-child { border-bottom: none; }
.predate-box {
  width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0;
  border: 1.5px solid rgba(168,85,247,.5); margin-top: 1px;
  background: rgba(168,85,247,.07); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--presence);
  -webkit-user-select: none; user-select: none;
  transition: background .15s, border-color .15s;
}
.predate-box.checked { background: rgba(168,85,247,.25); border-color: var(--presence); }
.predate-txt { flex: 1; }
.predate-name { font-size: 13px; font-weight: 600; color: var(--t1); }
.predate-note { font-size: 11px; color: var(--t2); margin-top: 2px; line-height: 1.4; }
.predate-reset {
  margin-top: 12px; text-align: center;
  font-size: 11px; color: var(--t3); cursor: pointer;
  padding: 6px; -webkit-user-select: none; user-select: none;
}
.predate-reset:active { color: var(--t2); }

/* Apollo tab system */
.ap-tabs {
  display: flex; gap: 6px; margin-bottom: 18px;
}
.ap-tab {
  flex: 1; padding: 8px 4px; text-align: center;
  border-radius: 10px; border: 1.5px solid var(--border);
  font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
  cursor: pointer; color: var(--t3); background: var(--surface2);
  transition: all .15s; -webkit-user-select: none; user-select: none;
}
.ap-tab.active {
  background: rgba(192,132,252,.15); border-color: var(--presence);
  color: var(--presence);
}
.ap-tab:active { opacity: .7; }

/* Apollo date planner embed */
.ap-plan-wrap {
  background: var(--surface); border-radius: 14px;
  border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px;
}
.ap-plan-hd {
  padding: 14px 16px 10px;
  font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
  color: var(--presence); border-bottom: 1px solid var(--border);
}
.ap-wx-strip {
  display: flex; gap: 5px; overflow-x: auto; padding: 12px 14px 8px;
  scrollbar-width: none;
}
.ap-wx-strip::-webkit-scrollbar { display: none; }
.ap-day-pill {
  flex: 0 0 62px; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 8px 4px; text-align: center;
  cursor: pointer; background: var(--surface2);
  transition: all .15s; -webkit-user-select: none; user-select: none;
}
.ap-day-pill.active {
  border-color: var(--presence); background: rgba(192,132,252,.12);
}
.ap-day-pill:active { opacity: .7; }
.ap-dp-lbl { font-size: 9px; font-weight: 700; color: var(--t3); letter-spacing: .4px; text-transform: uppercase; }
.ap-day-pill.active .ap-dp-lbl { color: var(--presence); }
.ap-dp-emoji { font-size: 16px; margin: 2px 0; }
.ap-dp-temp { font-size: 11px; font-weight: 600; color: var(--t1); }
.ap-dp-rain { font-size: 9px; color: var(--t3); min-height: 12px; }
.ap-today-badge {
  background: var(--presence); color: #fff;
  font-size: 8px; font-weight: 700; padding: 1px 4px;
  border-radius: 3px; text-transform: uppercase; display: block; margin-bottom: 1px;
}
.ap-day-info {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
}
.ap-day-emoji { font-size: 26px; }
.ap-day-stats { flex:1; }
.ap-day-title { font-size: 13px; font-weight: 600; color: var(--t1); }
.ap-day-sub { font-size: 11px; color: var(--t2); margin-top: 2px; }
.ap-cond-chip {
  padding: 4px 10px; border-radius: 14px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.ap-chip-great, .ap-chip-mild { background: rgba(34,197,94,.15); color: #16a34a; }
.ap-chip-rainy { background: rgba(59,130,246,.15); color: #2563eb; }

.ap-chip-hot   { background: rgba(239,68,68,.15); color: #dc2626; }
.ap-date-tabs {

}
.ap-dtype-tab {
  flex: 1; padding: 7px 4px; text-align: center;

}

.ap-dtype-title { font-size: 11px; font-weight: 600; color: var(--t2); }
.ap-dtype-tab.active .ap-dtype-title { color: var(--presence); }
.ap-dtype-sub { font-size: 9px; color: var(--t3); margin-top: 1px; }
.ap-itin-meta {
  display: flex; align-items: center; justify-content: space-between;

}
.ap-itin-vibe { font-size: 11px; font-style: italic; color: var(--t2); flex:1; padding-right: 8px; }
.ap-budget-pill {
  font-size: 11px; font-weight: 700; color: #16a34a;
  background: rgba(34,197,94,.12); padding: 3px 9px;

}
.ap-text-card {
  margin: 10px 14px; padding: 11px 12px;
  background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.25);

}
.ap-text-hd {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px;
}
.ap-text-lbl { font-size: 10px; font-weight: 800; letter-spacing: .7px; text-transform: uppercase; color: #3b82f6; }
.ap-copy-btn {
  background: #2563eb; color: #fff; border: none;
  border-radius: 6px; padding: 4px 10px; font-size: 11px;

}

.ap-text-msg {
  font-size: 12.5px; font-style: italic; color: var(--t1);

}
.ap-text-fn { font-size: 10px; color: var(--t3); line-height: 1.5; }
.ap-hh-banner {
  display: flex; align-items: flex-start; gap: 7px;
  margin: 8px 14px; padding: 8px 10px;
  background: rgba(251,191,36,.1); border: 1px solid rgba(251,191,36,.35);
  border-radius: 8px; font-size: 11px; color: #92400e; line-height: 1.5;
}
.ap-cf-wrap {
  margin: 10px 14px; padding: 10px 12px;
  border: 1.5px solid rgba(192,132,252,.3); border-radius: 10px;
}
.ap-cf-lbl { font-size: 10px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase; color: var(--presence); margin-bottom: 5px; }
.ap-cf-framing { font-size: 11px; color: var(--t2); line-height: 1.55; margin-bottom: 9px; }
.ap-cf-link {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 7px; border: 1px solid transparent;
  text-decoration: none; color: var(--t1); transition: background .12s;
}
.ap-cf-link:active { background: var(--surface2); }
.ap-cf-icon { font-size: 14px; flex-shrink: 0; }
.ap-cf-name { font-size: 12px; font-weight: 500; flex:1; }
.ap-cf-meta { font-size: 10px; color: var(--t3); white-space: nowrap; }
.ap-cf-arrow { font-size: 10px; color: var(--t3); margin-left: 2px; }
.ap-phases { display: flex; flex-direction: column; gap: 8px; padding: 10px 14px; }
.ap-phase-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  position: relative; overflow: hidden;
}
.ap-phase-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--presence); opacity: .5;
}
.ap-phase-card.optional::before { opacity: .2; }
.ap-phase-top {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap;
}
.ap-phase-num {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--presence); background: rgba(192,132,252,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: var(--presence); flex-shrink: 0;
}
.ap-phase-card.optional .ap-phase-num { opacity: .5; }
.ap-phase-title { font-size: 13px; font-weight: 600; color: var(--t1); flex:1; }
.ap-phase-dur {
  font-size: 10px; color: var(--t3); background: var(--surface);
  padding: 2px 7px; border-radius: 5px; white-space: nowrap;
}
.ap-hh-badge {
  font-size: 9px; font-weight: 700; color: #92400e;
  background: rgba(251,191,36,.2); border: 1px solid rgba(251,191,36,.4);
  padding: 2px 6px; border-radius: 4px; white-space: nowrap;
}
.ap-phase-desc { font-size: 12px; color: var(--t2); line-height: 1.55; margin-bottom: 7px; }
.ap-phase-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.ap-tag { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 5px; }
.ap-tag-cost { background: rgba(34,197,94,.12); color: #16a34a; }
.ap-tag-hood { background: var(--surface); color: var(--t3); }
.ap-tag-opt  { background: var(--surface); color: var(--t3); font-style: italic; }
.ap-phase-tip {
  margin-top: 7px; padding: 7px 10px;
  background: rgba(192,132,252,.08); border-left: 2.5px solid var(--presence);
  border-radius: 0 6px 6px 0; font-size: 11px; color: var(--t2); line-height: 1.5;
}
.ap-drink-note {
  margin-top: 6px; padding: 7px 10px;
  background: rgba(20,184,166,.08); border-left: 2.5px solid rgba(20,184,166,.5);
  border-radius: 0 6px 6px 0; font-size: 11px; color: var(--t2); line-height: 1.5;
}
.ap-drink-note strong {
  display: block; font-size: 10px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .4px; margin-bottom: 2px; color: #0f766e;
}
.ap-wx-loading { text-align: center; padding: 30px 20px; color: var(--t3); font-size: 13px; }
.ap-wx-spinner {
  width: 22px; height: 22px; border: 2px solid var(--border);
  border-top-color: var(--presence); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 0 auto 10px;
}

/* Apollo session logger */
.ap-log-wrap { padding: 4px 0 8px; }
.ap-log-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 10px;
}
.ap-log-sec-hd {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.ap-log-sec-title {
  font-size: 12px; font-weight: 800; letter-spacing: .5px;
  text-transform: uppercase; color: var(--presence);
}
.ap-log-sec-xp {
  font-size: 11px; font-weight: 700; color: var(--t3);
  background: var(--surface2); padding: 2px 8px; border-radius: 8px;
}
.ap-log-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-top: 1px solid var(--border);
}
.ap-log-row:first-of-type { border-top: none; padding-top: 0; }
.ap-log-lbl { font-size: 13px; color: var(--t1); font-weight: 500; flex:1; }
.ap-log-sub { font-size: 10px; color: var(--t3); margin-top: 1px; }
.ap-log-toggle {
  width: 36px; height: 20px; border-radius: 10px;
  background: var(--surface2); border: 1.5px solid var(--border);
  position: relative; cursor: pointer; flex-shrink: 0;
  transition: all .2s; -webkit-user-select: none; user-select: none;
}
.ap-log-toggle::after {
  content: ''; position: absolute; left: 2px; top: 2px;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--t3); transition: all .2s;
}
.ap-log-toggle.on {
  background: rgba(192,132,252,.25); border-color: var(--presence);
}
.ap-log-toggle.on::after { left: 18px; background: var(--presence); }
.ap-log-counter {
  display: flex; align-items: center; gap: 8px;
}
.ap-log-cnt-btn {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer; color: var(--t2); line-height: 1;
  -webkit-user-select: none; user-select: none; transition: background .12s;
}
.ap-log-cnt-btn:active { background: var(--border); }
.ap-log-cnt-val {
  min-width: 24px; text-align: center;
  font-size: 15px; font-weight: 700; color: var(--t1);
}
.ap-log-total {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(192,132,252,.08); border: 1px solid rgba(192,132,252,.25);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
}
.ap-log-total-lbl { font-size: 12px; color: var(--t2); font-weight: 500; }
.ap-log-total-xp { font-size: 18px; font-weight: 800; color: var(--presence); }
.ap-log-note { font-size: 10.5px; color: var(--t3); line-height: 1.5; text-align: center; padding: 4px 0 8px; }

/* ===== PROMETHEUS MODULE ===== */
.craft-log-section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 14px 14px 12px; margin-bottom: 12px;
}
.craft-log-ttl {
  font-size: 13px; font-weight: 800; color: var(--t1); margin-bottom: 3px;
}
.craft-log-hint {
  font-size: 11px; color: var(--t3); margin-bottom: 10px;
}
.craft-log-input-row {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.craft-log-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 12px; font-size: 13px;
  color: var(--t1); font-family: inherit; outline: none;
}
.craft-log-input:focus { border-color: var(--craft); }
.craft-log-btn {
  border: none; border-radius: 8px; padding: 9px 16px;
  font-size: 12px; font-weight: 800; color: #000; cursor: pointer;
  letter-spacing: .5px; white-space: nowrap; flex-shrink: 0;
}
.craft-log-history {
  border-top: 1px solid var(--border); padding-top: 10px;
  display: flex; flex-direction: column; gap: 6px;
}
.craft-log-entry {
  display: flex; gap: 10px; align-items: baseline;
}
.craft-log-date {
  font-size: 10px; font-weight: 800; color: var(--t3);
  text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; flex-shrink: 0;
}
.craft-log-text {
  font-size: 12px; color: var(--t2); line-height: 1.4;
}
.craft-rule {
  font-size: 13px; color: var(--t2); line-height: 1.5;
  padding: 3px 0; border-bottom: 1px solid var(--border);
}
.craft-rule:last-of-type { border-bottom: none; }
.craft-insight {
  margin-top: 12px; background: var(--bg); border-left: 3px solid var(--craft);
  padding: 10px 12px; border-radius: 0 8px 8px 0;
  font-size: 12px; color: var(--t2); line-height: 1.5;
}
.craft-phase {
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.craft-phase:last-child { border-bottom: none; }
.craft-phase-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap;
}
.craft-phase-tag {
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .8px; color: var(--t3);
}
.craft-phase-name {
  font-size: 13px; font-weight: 700; color: var(--t1);
}
.craft-phase-now {
  font-size: 10px; font-weight: 800; color: var(--craft);
  letter-spacing: .5px; animation: glowPulse 2s infinite;
}
.craft-phase.active .craft-phase-desc {
  color: var(--t2);
}
.craft-phase-desc {
  font-size: 12px; color: var(--t3); line-height: 1.5;
}
.craft-sess-form {
  margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
}
.craft-sess-form-ttl {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .8px; color: var(--t3); margin-bottom: 8px;
}
.craft-pillar-pick {
  display: flex; gap: 6px; margin-top: 8px;
}
.craft-pillar-opt {
  flex: 1; text-align: center; padding: 7px 4px;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 11px; font-weight: 700; color: var(--t3);
  cursor: pointer; transition: all .15s; -webkit-user-select: none; user-select: none;
}
.craft-pillar-opt.selected {
  border-color: var(--craft); color: var(--craft);
  background: color-mix(in srgb, var(--craft) 12%, transparent);
}
.craft-pillar-opt:active { opacity: .7; }
.craft-sess-done-lbl {
  margin-top: 6px; font-size: 12px; color: var(--craft); font-weight: 600;
}
.craft-sess-pill {
  font-size: 10px; font-weight: 800; padding: 2px 6px;
  border-radius: 4px; white-space: nowrap; flex-shrink: 0;
}
.craft-pillar-section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 12px 14px; margin-bottom: 12px;
}
.craft-pillar-ttl {
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .8px; color: var(--t3); margin-bottom: 10px;
}
.craft-pillar-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 7px;
}
.craft-pillar-row:last-child { margin-bottom: 0; }
.craft-pillar-lbl {
  font-size: 11px; font-weight: 700; color: var(--t2);
  width: 60px; flex-shrink: 0;
}
.craft-pillar-track {
  flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.craft-pillar-fill {
  height: 100%; border-radius: 3px; transition: width .4s ease;
  min-width: 2px;
}
.craft-pillar-pct {
  font-size: 11px; font-weight: 700; color: var(--t3);
  width: 24px; text-align: right; flex-shrink: 0;
}

/* ===== SCAFFOLD ===== */
.scaffold { padding: 40px 16px; text-align: center; }
.scaffold-ico { font-size: 52px; display: block; margin-bottom: 16px; opacity: .2; }
.scaffold-ttl { font-size: 20px; font-weight: 800; color: var(--t1); margin-bottom: 8px; }
.scaffold-body { font-size: 14px; color: var(--t2); line-height: 1.6; max-width: 280px; margin: 0 auto; }
.scaffold-science {
  margin-top: 24px; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 16px; text-align: left;
}
.scaffold-sci-ttl {
  font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
  color: var(--t3); margin-bottom: 10px;
}
.scaffold-sci-body { font-size: 12px; color: var(--t2); line-height: 1.8; }

/* ===== ANIMATIONS ===== */
@keyframes fadein  { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes popcheck { 0%{transform:scale(1)} 30%{transform:scale(.88)} 65%{transform:scale(1.08)} 100%{transform:scale(1)} }
@keyframes glowPulse {
  0%,100% { filter: drop-shadow(0 0 4px var(--glow-white)); }
  50%      { filter: drop-shadow(0 0 12px var(--glow-white)); }
}
@keyframes pulseTag {
  0%,100% { opacity:1; }
  50%      { opacity:.65; }
}
@keyframes ringPop {
  0%   { transform:scale(1); }
  40%  { transform:scale(1.04); }
  100% { transform:scale(1); }
}

.ti.popping { animation: popcheck .3s cubic-bezier(.34,1.56,.64,1); }
.fadein { animation: fadein .2s ease; }
.oring-rel { animation: glowPulse 3.5s ease-in-out infinite; }

/* ===== NIGHT SCHEDULE TABLE ===== */
.sched-table { margin-top: 4px; }
.sched-row {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.sched-row:last-child { border-bottom: none; }
.sched-time {
  font-size: 12px; font-weight: 700; color: var(--vitality);
  min-width: 54px; flex-shrink: 0; padding-top: 1px;
  font-variant-numeric: tabular-nums;
}
.sched-desc { font-size: 13px; color: var(--t2); line-height: 1.4; }
.sched-row.tgt .sched-time { color: var(--vitality); text-shadow: 0 0 8px var(--glow-vitality); }
.sched-row.tgt .sched-desc { color: var(--t1); font-weight: 600; }

/* ===== DIVIDER ===== */
.div { height: 1px; background: var(--border); margin: 6px 0; }

/* ===== FOOTER HINT ===== */
.footer-hint { padding: 24px 0 8px; text-align: center; color: var(--t3); font-size: 12px; line-height: 1.8; }
.footer-hint a { color: var(--vitality); text-decoration: none; }

/* ===== RANK & LEVEL SYSTEM ===== */
.rank-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  margin-top: 10px; margin-bottom: 2px;
}
.rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 52px; height: 52px; border-radius: 14px;
  font-size: 24px; font-weight: 700; letter-spacing: 2px;
  font-family: var(--font-display);
  border: 2px solid; transition: box-shadow .4s;
}
.rank-E { color: var(--t3); border-color: var(--border-b); background: var(--card); }
.rank-D { color: var(--success); border-color: rgba(31,191,88,.45); background: rgba(31,191,88,.07); box-shadow: 0 0 16px rgba(31,191,88,.14); }
.rank-C { color: var(--info); border-color: rgba(56,189,248,.45); background: rgba(56,189,248,.07); box-shadow: 0 0 16px rgba(56,189,248,.14); }
.rank-B { color: var(--presence); border-color: rgba(176,110,255,.45); background: rgba(176,110,255,.07); box-shadow: 0 0 20px rgba(176,110,255,.18); }
.rank-A { color: var(--vitality); border-color: rgba(255,169,64,.45); background: rgba(255,169,64,.07); box-shadow: 0 0 20px rgba(255,169,64,.18); }
.rank-S { color: #FFD700; border-color: rgba(255,215,0,.55); background: rgba(255,215,0,.07); box-shadow: 0 0 28px rgba(255,215,0,.25); }
.rank-lbl { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--t3); }

.lv-sc-badge {
  display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 6px;
  font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px;
  background: color-mix(in srgb, var(--sc-color) 12%, transparent);
  color: var(--sc-color);
  border: 1px solid color-mix(in srgb, var(--sc-color) 28%, transparent);
  margin-top: 3px;
}

.lv-section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 14px 15px;
  margin-bottom: 16px;
}
.lv-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.lv-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--t2); }
.lv-badge-lg { font-size: 17px; font-weight: 700; color: var(--sc-color); font-variant-numeric: tabular-nums; font-family: var(--font-display); letter-spacing: 1px; }
.lv-xp-txt { font-size: 12px; color: var(--t2); font-weight: 700; font-variant-numeric: tabular-nums; }
.lv-sub { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
.lv-target-txt { font-size: 10px; color: var(--t3); }
.lv-pct-txt { font-size: 10px; font-weight: 800; color: var(--sc-color); }
.lv-up-btn {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 10px; padding: 8px 14px; border-radius: 10px;
  background: color-mix(in srgb, var(--sc-color) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--sc-color) 35%, transparent);
  font-size: 12px; font-weight: 700; color: var(--sc-color);
  cursor: pointer; -webkit-user-select: none; user-select: none;
  transition: background .15s;
  width: 100%;  justify-content: center;
}
.lv-up-btn:active { background: color-mix(in srgb, var(--sc-color) 20%, transparent); }

/* ===== BOTTLENECK SYSTEM ===== */
.bn-banner {
  background: rgba(245,158,11,.05);
  border: 1px solid rgba(245,158,11,.28);
  border-radius: var(--r-lg); padding: 13px 15px;
  margin-bottom: 14px;
  display: flex; align-items: flex-start; gap: 12px;
  position: relative; overflow: hidden;
  animation: slideUp .25s ease;
}
.bn-banner::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--warning); box-shadow: 0 0 8px rgba(245,158,11,.6);
  border-radius: 0 2px 2px 0;
}
.bn-ico { font-size: 18px; flex-shrink: 0; padding-top: 1px; }
.bn-tag {
  font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--warning); margin-bottom: 3px;
}
.bn-ttl { font-size: 14px; font-weight: 800; color: var(--t1); line-height: 1.3; }
.bn-sub { font-size: 11px; color: var(--t2); margin-top: 3px; line-height: 1.4; }

/* Bottleneck stat card pulse */
@keyframes bnPulse {

  animation: bnPulse 2.8s ease-in-out infinite;
}

  display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 5px;
  font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px;
  background: rgba(245,158,11,.1); color: var(--warning);
  border: 1px solid rgba(245,158,11,.3); margin-top: 3px;

  background: rgba(255,169,64,.06);
  border: 1px solid rgba(255,169,64,.28);
  border-radius: var(--r-lg); padding: 13px 15px;
  margin-bottom: 14px;
  display: flex; align-items: flex-start; gap: 12px;
  position: relative; overflow: hidden;
  cursor: pointer;
  animation: slideUp .25s ease;
}
.sf-banner::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--vitality); box-shadow: 0 0 8px rgba(255,169,64,.55);
  border-radius: 0 2px 2px 0;
}
.sf-tag {
  font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--vitality); margin-bottom: 3px;
}
.sf-ttl { font-size: 14px; font-weight: 800; color: var(--t1); line-height: 1.3; }
.sf-sub { font-size: 11px; color: var(--t2); margin-top: 3px; line-height: 1.4; }

/* ===== VISUAL OVERHAUL — THE SYSTEM — Arise Aesthetic ===== */

/* Scan line body overlay — barely perceptible, adds depth */
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 3px,
    rgba(5,0,16,0.11) 3px, rgba(5,0,16,0.11) 4px
  );
  animation: scanMove 14s linear infinite;
}
@keyframes scanMove {
  0%   { background-position: 0 0; }
  100% { background-position: 0 120px; }
}

/* Card corner bracket (inside overflow:hidden bounds — positive inset values) */
.sc::after {
  content: '';
  position: absolute;
  top: 7px; right: 7px;
  width: 9px; height: 9px;
  border-top: 1.5px solid var(--sc-color, #fff);
  border-right: 1.5px solid var(--sc-color, #fff);
  opacity: 0.38;
  pointer-events: none;
  transition: opacity .2s;
}
.sc:active::after { opacity: 0.85; }

/* Progress bar shimmer (overflow:hidden on fill doesn't clip own box-shadow — parent is overflow:visible) */
.prog-fill {
  position: relative;
  overflow: hidden;
}
.prog-fill::after {
  content: '';
  position: absolute;
  top: 0; left: -120%;
  width: 70%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.42), transparent);
  animation: shimmer 3s ease-in-out infinite;
}
@keyframes shimmer {
  0%   { left: -120%; }
  100% { left: 220%; }
}

@keyframes sysGlow {
  0%, 100% { text-shadow: 0 0 8px rgba(168,85,247,0.55); opacity: 0.85; }
  50%       { text-shadow: 0 0 18px rgba(168,85,247,1), 0 0 36px rgba(168,85,247,0.35); opacity: 1; }
}

.rank-B { animation: rankPulseB 3.4s ease-in-out infinite; }
.rank-A { animation: rankPulseA 3s ease-in-out infinite; }
.rank-S { animation: rankPulseS 2.3s ease-in-out infinite; }

  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.1); }
}

  content: '';

  opacity: 0.25;
}

function migrateState(s) {
  if (!s.xp) s.xp = {};
  if (!s.levels) s.levels = {};
  if (!s.cfg) s.cfg = {};

  // ── Schema v1 → v2: presence splits into apollo + hestia ──
  if (!s.schemaVersion || s.schemaVersion < 2) {
    // Migrate presence XP → apollo
    if (s.xp.presence && !s.xp.apollo) s.xp.apollo = { ...s.xp.presence };
    // Migrate presence level → apollo (one level lower, min 1); hestia starts at 1
    if (s.levels.presence !== undefined && s.levels.apollo === undefined) {
      s.levels.apollo  = Math.max(1, (s.levels.presence || 1));
      s.levels.hestia  = 1;
    }
    // 30-day grace period: Hestia excluded from Connection bottleneck
    if (!s.cfg.hestiaGraceUntil) {
      const graceEnd = new Date();
      graceEnd.setDate(graceEnd.getDate() + 30);
      s.cfg.hestiaGraceUntil = localDk(graceEnd);
    }
    s.cfg.levelConfirmed = false;  // trigger one-time confirmation prompt
    s.schemaVersion = 2;
  }

  // ── Ensure all keys exist (forward-compat) ──
  ['physique','vitality','apollo','hestia','craft','purpose'].forEach(m => {
    if (!s.xp[m])           s.xp[m]     = { weekly: 0, weekKey: '' };
    if (s.levels[m] === undefined) s.levels[m] = 1;
  });

  // Config defaults
  if (s.cfg.sleepDebt       === undefined) s.cfg.sleepDebt       = null;
  if (s.cfg.sleepEff        === undefined) s.cfg.sleepEff        = null;
  if (s.cfg.sleepCon        === undefined) s.cfg.sleepCon        = null;
  if (s.cfg.pipelineUrl     === undefined) s.cfg.pipelineUrl     = '';
  if (s.cfg.hestiaGraceUntil=== undefined) s.cfg.hestiaGraceUntil= null;
  if (s.cfg.levelConfirmed  === undefined) s.cfg.levelConfirmed  = true;

  if (!s.preDate)    s.preDate    = {};
  if (!s.sessionLog) s.sessionLog = { weekKey:'', dance:false, danceConvos:0, danceNumbers:0, runClub:false, runStayed:false, spikeEvent:false, approaches:0, numbers:0, dates:0 };

  // Hestia state
  if (!s.hestia) s.hestia = { friends:[], embodiedHoursLog:[], maintenanceMoves:[], deepeningLog:[], unoptimizedRelationship:'' };
  if (!s.hestia.friends)                s.hestia.friends                = [];
  if (!s.hestia.embodiedHoursLog)       s.hestia.embodiedHoursLog       = [];
  if (!s.hestia.maintenanceMoves)       s.hestia.maintenanceMoves       = [];
  if (!s.hestia.deepeningLog)           s.hestia.deepeningLog           = [];
  if (s.hestia.unoptimizedRelationship  === undefined) s.hestia.unoptimizedRelationship = '';

  // Seneca Capacity state
  if (!s.senecaCapacity) s.senecaCapacity = { hardConversations:[], therapySessions:[], selectionReviews:[] };
  if (!s.senecaCapacity.hardConversations) s.senecaCapacity.hardConversations = [];
  if (!s.senecaCapacity.therapySessions)   s.senecaCapacity.therapySessions   = [];
  if (!s.senecaCapacity.selectionReviews)  s.senecaCapacity.selectionReviews  = [];

  s.v = 3;
  return s;
}

function weekKey(d = new Date()) {
  const date = new Date(d);
  date.setHours(0,0,0,0);
  const jan1 = new Date(date.getFullYear(), 0, 1);
  const wn   = Math.ceil(((date - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${date.getFullYear()}-W${String(wn).padStart(2,'0')}`;
}

function initXP(mod) {
  if (!S.xp) S.xp = {};
  const wk = weekKey();
  if (!S.xp[mod] || S.xp[mod].weekKey !== wk) {
    S.xp[mod] = { weekly: 0, weekKey: wk };
  }
}

function getWeeklyXP(mod) { initXP(mod); return S.xp[mod].weekly; }

function addXP(mod, delta) {
  initXP(mod);
  S.xp[mod].weekly = Math.max(0, S.xp[mod].weekly + delta);
}

// ── Connection stat — Apollo + Hestia bottleneck ──────────
// Returns the effective Connection level.
// During the 30-day Hestia grace period, Connection = Apollo level (Hestia excluded).
// After grace period, Connection = min(apollo, hestia).
function connectionLevel() {
  const apollo = S.levels?.apollo || 1;
  const hestia = S.levels?.hestia || 1;
  const grace  = S.cfg?.hestiaGraceUntil;
  if (grace && dk() <= grace) return apollo;  // grace: ignore hestia bottleneck
  return Math.min(apollo, hestia);
}

// Returns the five "stat-level" values used for rank and bottleneck.
// Connection replaces the old presence/apollo/hestia split.
function statLevels() {
  return {
    physique:   S.levels?.physique  || 1,
    vitality:   S.levels?.vitality  || 1,
    connection: connectionLevel(),
    craft:      S.levels?.craft     || 1,
    purpose:    S.levels?.purpose   || 1,
  };
}

// ── Rank calculation ───────────────────────────────────────
function calcRank() {
  const sl   = statLevels();
  const vals = Object.values(sl);
  const min  = Math.min(...vals);
  if (vals.every(l => l >= 9)) return 'S';
  if (vals.every(l => l >= 7)) return 'A';
  if (vals.every(l => l >= 5) && vals.filter(l => l >= 7).length >= 2) return 'B';
  if (vals.every(l => l >= 3) && vals.filter(l => l >= 5).length >= 2) return 'C';
  if (min >= 2 && vals.filter(l => l >= 3).length >= 3) return 'D';
  return 'E';
}

// ── Bottleneck detection ───────────────────────────────────
// Operates on the 5-stat view (connection = min apollo+hestia).
const MOD_NAMES = { physique:'Adonis', vitality:'Somnus', connection:'Connection', apollo:'Apollo', hestia:'Hestia', craft:'Prometheus', purpose:'Seneca' };
const MOD_STAT  = { physique:'Physique', vitality:'Vitality', connection:'Connection', craft:'Craft', purpose:'Purpose' };

function getBottleneck() {
  const sl     = statLevels();
  const entries = Object.entries(sl);
  const minLv  = Math.min(...entries.map(([,v]) => v));
  const stats  = entries.filter(([,v]) => v === minLv).map(([k]) => k);
  return { level: minLv, stats };
}

function bottleneckBanner() {
  const bn = getBottleneck();
  if (!bn) return '';
  const sl    = statLevels();
  const vals  = Object.values(sl);
  const maxLv = Math.max(...vals);
  if (maxLv === bn.level) return '';
  const statLabel = bn.stats.map(s => ({
    physique:'Adonis', vitality:'Somnus', connection:'Connection', craft:'Prometheus', purpose:'Seneca'
  }[s] || s)).join(' + ');
  const gap     = maxLv - bn.level;
  const subtext = gap >= 2
    ? `${gap} LEVELS BEHIND THE PACK. THIS IS YOUR RANK CEILING.`
    : `ONE LEVEL BEHIND. ADVANCE TO ${lvStr(bn.level + 1)} TO UNLOCK THE NEXT RANK TIER.`;
  return `
  <div class="bn-banner">
    <div class="bn-ico">◈</div>
    <div>
      <div class="bn-tag">[ SYSTEM ALERT — CRITICAL PATH ]</div>
      <div class="bn-ttl">${statLabel} · ${lvStr(bn.level)}</div>
      <div class="bn-sub">${subtext}</div>
    </div>
  </div>`;
}

// ── Sleep focus — metric-based bottleneck (independent of level gap) ──
// Fires when Whoop/Oura numbers are below evidence-based thresholds.
// Thresholds: debt > 60 min OR efficiency < 80% OR consistency < 70%.
// User updates these weekly in Settings → Sleep System.
function getSleepFocus() {
  // Prefer live Somnus data; fall back to manually entered Settings values.
  const ss   = getSS();
  const debt = ssDebtAvg7(ss)   ?? S.cfg.sleepDebt ?? null;  // minutes
  const eff  = ssEffAvg7(ss)    ?? S.cfg.sleepEff  ?? null;  // percent
  const con  = ssConsistPct7(ss)?? S.cfg.sleepCon  ?? null;  // percent
  const triggers = [];
  if (debt !== null && debt > 60) {
    const h = Math.floor(debt / 60);
    const m = debt % 60;
    triggers.push(m > 0 ? `${h}h ${m}m debt` : `${h}h debt`);
  }
  if (eff !== null && eff < 80)  triggers.push(`${eff}% efficiency`);
  if (con !== null && con < 70)  triggers.push(`${con}% consistency`);
  return triggers.length > 0 ? triggers : null;
}

function sleepFocusBanner() {
  const triggers = getSleepFocus();
  if (!triggers) return '';
  return `
  <div class="sf-banner" onclick="go('vitality')">
    <div class="bn-ico">🌙</div>
    <div>
      <div class="sf-tag">[ SYSTEM WARNING — VITALITY ]</div>
      <div class="sf-ttl">Somnus · Sleep Debt Unresolved</div>
      <div class="sf-sub">${triggers.join(' · ')} — This is your #1 rank limiter. Everything else compounds on top of this.</div>
    </div>
  </div>`;
}

// ── Somnus Bridge — live read/write of somnus_state_v1 ─────
// Both apps share the same localStorage origin on GitHub Pages
// (diegoarm-ai.github.io), so this is a direct shared-memory bridge.
const SS_KEY = 'somnus_state_v1';

function getSS() {
  try { const r = localStorage.getItem(SS_KEY); return r ? JSON.parse(r) : null; }
  catch(_) { return null; }
}
function writeSS(ss) {
  try { localStorage.setItem(SS_KEY, JSON.stringify(ss)); } catch(_) {}
}

// Somnus ramp math — ported from somnus/index.html (read-only)
function ssToMin(hhmm)       { const p=hhmm.split(':').map(Number); return p[0]*60+p[1]; }
function ssHhmmFromMin(m)    { m=((m%1440)+1440)%1440; return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function ssToSigned(hhmm)    { const m=ssToMin(hhmm); return m<720?m+1440:m; }
function ssFromSigned(s)     { return ((s%1440)+1440)%1440; }
function ssDaysBetween(a,b)  { return Math.floor((new Date(b+'T00:00:00Z')-new Date(a+'T00:00:00Z'))/86400000); }
function localDk(d=new Date()){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function ssDaysAgo(n)        { const d=new Date(); d.setDate(d.getDate()-n); return localDk(d); }

function ssFinalTarget(ss) {
  if (!ss) return '23:30';
  const need = ss.settings?.sleepNeedMin || 555;
  const eff  = (ss.settings?.efficiencyPct || 87.5) / 100;
  const win  = Math.round(need / eff);
  const wake = ssToMin(ss.settings?.wake || '09:00');
  return ssHhmmFromMin(((wake - win) % 1440 + 1440) % 1440);
}

function ssIsEmergency(ss) {
  if (!ss) return false;
  if (ss.emergency?.manualOverride === 'off') return false;
  if (ss.emergency?.manualOverride === 'on')  return true;
  const gaps = [];
  for (let i=1;i<=7;i++) { const e=ss.data?.[ssDaysAgo(i)]; if(e&&typeof e.gap==='number') gaps.push(e.gap); }
  return gaps.length >= 3 && (gaps.reduce((a,b)=>a+b,0)/gaps.length) > 90;
}

function ssRampTarget(ss) {
  if (!ss) return null;
  if (ssIsEmergency(ss)) return '22:30';
  const final = ssFinalTarget(ss);
  if (!ss.ramp?.startedAt || !ss.ramp?.startOnset) return final;
  const elapsed  = Math.max(0, ssDaysBetween(ss.ramp.startedAt, dk()));
  const calWeek  = Math.floor(elapsed / 7);
  const holds    = ss.ramp.weeksHeld || [];
  let totalHolds = 0;
  for (let i=0;i<calWeek&&i<holds.length;i++) totalHolds += (holds[i]||0);
  const advances     = Math.max(0, calWeek - totalHolds);
  const startSigned  = ssToSigned(ss.ramp.startOnset);
  const finalSigned  = ssToSigned(final);
  let rampSigned     = startSigned - 15 * advances;
  if (rampSigned < finalSigned) rampSigned = finalSigned;
  if (rampSigned > startSigned) rampSigned = startSigned;
  return ssHhmmFromMin(ssFromSigned(rampSigned));
}

function ss7dayAdherence(ss) {
  if (!ss?.data) return null;
  const entries = [];
  for (let i=1;i<=7;i++) { const e=ss.data[ssDaysAgo(i)]; if(e?.status) entries.push(e); }
  if (entries.length < 2) return null;
  const good = entries.filter(e=>e.status==='yes'||e.status==='social').length;
  return Math.round(good / entries.length * 100);
}

function ss7dayValves(ss) {
  if (!ss?.valves) return 0;
  let c = 0;
  for (let i=1;i<=7;i++) { const v=ss.valves[ssDaysAgo(i)]; if(v) c+=v; }
  return c;
}

function ssDebtAvg7(ss) {
  if (!ss?.data) return null;
  const gaps = [];
  for (let i=1;i<=7;i++) { const e=ss.data?.[ssDaysAgo(i)]; if(e&&typeof e.gap==='number') gaps.push(e.gap); }
  if (gaps.length < 2) return null;
  return Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length);
}

function ssEffAvg7(ss) {
  // 7-day average of nightly Oura efficiency logs
  if (!ss?.data) return null;
  const vals = [];
  for (let i=1;i<=7;i++) { const e=ss.data?.[ssDaysAgo(i)]; if(e&&typeof e.ouraEff==='number') vals.push(e.ouraEff); }
  if (vals.length < 2) return null;
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}

function ssConsistPct7(ss) {
  // % of last 7 nights where protocol was followed (yes or social = on schedule)
  // Mirrors Somnus scorecard logic
  if (!ss?.data) return null;
  let logged = 0, onTime = 0;
  for (let i=1;i<=7;i++) {
    const e = ss.data?.[ssDaysAgo(i)];
    if (e?.status) { logged++; if (e.status==='yes'||e.status==='social') onTime++; }
  }
  if (logged < 2) return null;
  return Math.round(onTime / 7 * 100);  // out of 7 nights, matching Somnus scorecard
}

function ssLastStatus(ss) {
  return ss?.data?.[ssDaysAgo(1)]?.status || null;
}

function ssRampWeek(ss) {
  if (!ss?.ramp?.startedAt) return null;
  return Math.floor(Math.max(0, ssDaysBetween(ss.ramp.startedAt, dk())) / 7);
}

// ── Time utilities ─────────────────────────────────────────
function dk(d = new Date()) { return localDk(d); }

function block() {
  const h = new Date().getHours();
  const wh = parseInt(S.cfg.wake) || 9;
  if (h >= wh && h < 12) return 'morning';
  if (h >= 12 && h < 18) return 'afternoon';
  if (h >= 18 && h < 22) return 'evening';
  return 'night';
}

function isWkDay() { return new Date().getDay() === S.cfg.dermaDay; }

function fmtHHMM(t) {
  if (!t) return '11:30pm';
  const [hh, mm] = t.split(':').map(Number);
  const p = hh >= 12 ? 'pm' : 'am';
  const d = hh > 12 ? hh - 12 : (hh === 0 ? 12 : hh);
  return mm ? `${d}:${mm.toString().padStart(2,'0')}${p}` : `${d}${p}`;
}

function greeting() {
  const h = new Date().getHours();
  return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';

function allTasksToday() {

// ── Streak ─────────────────────────────────────────────────
function recalcStreak() {
  const today = dk();
  const yest  = dk(new Date(Date.now() - 86400000));
  const p = overallPct();
  if (p >= 80) {
    if (S.streaks.overall.last === yest) S.streaks.overall.n++;
    else if (S.streaks.overall.last !== today) S.streaks.overall.n = 1;
    S.streaks.overall.last = today;
  }
}

// ── SVG Ring ───────────────────────────────────────────────
function ring(p, size=56, sw=4, col='#fff') {
  const r = (size - sw) / 2;
  const c = size / 2;
  const circ = 2 * Math.PI * r;
  const d = circ * (p/100);
  const glowId = 'gf' + size + col.replace(/[^a-z0-9]/gi,'');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" fill="none">
    <defs>
      <filter id="${glowId}" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="2.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <circle cx="${c}" cy="${c}" r="${r}" stroke="#1A0840" stroke-width="${sw}"/>
    <circle cx="${c}" cy="${c}" r="${r}" stroke="${col}" stroke-width="${sw}"
      stroke-dasharray="${d} ${circ-d}" stroke-linecap="round"
      transform="rotate(-90 ${c} ${c})"
      filter="url(#${glowId})"
      style="transition:stroke-dasharray .5s cubic-bezier(.4,0,.2,1)"/>
  </svg>`;
}

// ── Somnus Live Times — patch task names/notes with tonight's actual times ─
// Runs on every render. Reads Somnus localStorage bridge (same GitHub Pages origin).
// Falls back gracefully to a static label if Somnus data isn't available.
function patchSomnusTimes() {
  const ss      = getSS();
  const inBed   = ssRampTarget(ss) || ssFinalTarget(ss);  // e.g. "23:30" or "00:15"

  // Compute offsets from in-bed time
  const inBedSigned = ssToSigned(inBed);
  function tOffset(offsetMin) {
    return fmtHHMM(ssHhmmFromMin(ssFromSigned(inBedSigned - offsetMin)));
  }

  const inBedFmt   = fmtHHMM(inBed);              // e.g. "11:30pm"
  const dimFmt     = tOffset(150);                 // 2h30m before in-bed
  const showerFmt  = tOffset(90);                 // 90 min before in-bed
  const screensFmt = tOffset(60);                 // 60 min before in-bed

  const tokens = {
    '__INBED_TIME__':   inBedFmt,
    '__DIM_TIME__':     dimFmt,
    '__SHOWER_TIME__':  showerFmt,
    '__SCREENS_TIME__': screensFmt,
  };

  function applyTokens(str) {
    if (!str) return str;
    let s = str;
    for (const [tok, val] of Object.entries(tokens)) {
      s = s.replaceAll(tok, val);
    }
    return s;
  }

  // Patch all vitality pm tasks in place
  P.vitality.pm.forEach(t => {
    if (!t._origName) t._origName = t.name;
    if (!t._origNote) t._origNote = t.note;
    t.name = applyTokens(t._origName);
    t.note = applyTokens(t._origNote);
  });
}

// ── Awakening System — color shift blue→purple by task completion ─
// 0–24%:  dawn    (cold steel blue)
// 25–49%: stirring (blue-purple)
// 50–79%: awakening (mid violet)
// 80–99%: arising  (electric purple)
// 100%:   ARISE    (full Shadow Monarch mode)
function updateAwakening() {
  const p = overallPct();
  const html = document.documentElement;
  html.classList.remove('awaken-low','awaken-mid','awaken-high','awaken-arise');
  if (p >= 100)     html.classList.add('awaken-arise');
  else if (p >= 80) html.classList.add('awaken-high');
  else if (p >= 50) html.classList.add('awaken-mid');
  else if (p >= 25) html.classList.add('awaken-low');

  // Overlay shimmer at 100%
  let overlay = document.getElementById('arise-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'arise-overlay';
    overlay.className = 'arise-overlay';
    document.body.appendChild(overlay);
  }
  if (p >= 100) {
    overlay.classList.add('active');
  } else {
    overlay.classList.remove('active');
  }
}

// XP float toast
function showXpToast(xp, el) {
  if (!xp || xp <= 0) return;
  const toast = document.createElement('div');
  toast.className = 'xp-toast';
  toast.textContent = '+' + xp + ' XP';
  if (el) {
    const r = el.getBoundingClientRect();
    toast.style.left = (r.left + r.width / 2) + 'px';
    toast.style.top  = (r.top + 8) + 'px';
  }
  document.body.appendChild(toast);
  setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 800);
}

// Toggle from Today view — re-renders home
function todToggle(id, el) {
  if (TASK_INPUT[id] && !done(id)) {
    go(TASK_MOD[id]);
    return;
  }
  const wasNotDone = !done(id);
  const scr = document.getElementById('s-home');
  const scrollY = scr ? scr.scrollTop : 0;
  if (wasNotDone) showXpToast(TASK_XP[id], el);
  toggle(id);
  setTimeout(function() {
    rHome();
    if (scr) scr.scrollTop = scrollY;
  }, 120);
}

  const itemsH = tasks.map(t => `
